---
# =========================================
# Palo Alto PAN-OS IDPS DISA STIG V3 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 29 (CAT I: 0, CAT II: 27, CAT III: 2)
#
# Usage:
#   --tags authorization            (5 rules)
#   --tags logging                  (19 rules)
#   --tags network_services         (3 rules)
#   --tags routing                  (1 rules)
#   --tags system_hardening         (1 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags PANW-IP-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is Palo Alto PAN-OS"
  ansible.builtin.assert:
    that:
      - ansible_connection == "local" or panos_provider is defined
    fail_msg: >-
      This role targets Palo Alto PAN-OS only.
    quiet: true
  tags:
    - always

- name: "PANW-IP | Authorization (5 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "PANW-IP | Logging (19 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "PANW-IP | Network Services (3 rules)"
  ansible.builtin.import_tasks: network_services.yml
  tags:
    - network_services

- name: "PANW-IP | Routing (1 rules)"
  ansible.builtin.import_tasks: routing.yml
  tags:
    - routing

- name: "PANW-IP | System Hardening (1 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
