---
# =========================================
# Palo Alto Prisma Cloud Compute Cloud DISA STIG V2 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 31 (CAT I: 8, CAT II: 23, CAT III: 0)
#
# Usage:
#   --tags access_control           (2 rules)
#   --tags authentication           (5 rules)
#   --tags authorization            (4 rules)
#   --tags logging                  (5 rules)
#   --tags network_services         (6 rules)
#   --tags routing                  (1 rules)
#   --tags session_management       (2 rules)
#   --tags system_hardening         (6 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags CNTR-PC-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is Palo Alto Prisma Cloud Compute"
  ansible.builtin.assert:
    that:
      - pan_prisma_cloud_stig_api_url is defined
    fail_msg: >-
      This role targets Palo Alto Prisma Cloud Compute only.
    quiet: true
  tags:
    - always

- name: "CNTR-PC | Access Control (2 rules)"
  ansible.builtin.import_tasks: access_control.yml
  tags:
    - access_control

- name: "CNTR-PC | Authentication (5 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "CNTR-PC | Authorization (4 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "CNTR-PC | Logging (5 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "CNTR-PC | Network Services (6 rules)"
  ansible.builtin.import_tasks: network_services.yml
  tags:
    - network_services

- name: "CNTR-PC | Routing (1 rules)"
  ansible.builtin.import_tasks: routing.yml
  tags:
    - routing

- name: "CNTR-PC | Session Management (2 rules)"
  ansible.builtin.import_tasks: session_management.yml
  tags:
    - session_management

- name: "CNTR-PC | System Hardening (6 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
