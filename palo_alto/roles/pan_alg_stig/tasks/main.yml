---
# =========================================
# Palo Alto PAN-OS ALG DISA STIG V3 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 50 (CAT I: 1, CAT II: 46, CAT III: 3)
#
# Usage:
#   --tags access_control           (5 rules)
#   --tags authentication           (1 rules)
#   --tags authorization            (11 rules)
#   --tags encryption               (7 rules)
#   --tags logging                  (17 rules)
#   --tags network_services         (6 rules)
#   --tags routing                  (1 rules)
#   --tags session_management       (1 rules)
#   --tags system_hardening         (1 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags PANW-AG-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is Palo Alto PAN-OS"
  ansible.builtin.assert:
    that:
      - ansible_connection == "local" or panos_provider is defined
    fail_msg: >-
      This role targets Palo Alto PAN-OS only.
    quiet: true
  tags:
    - always

- name: "PANW-AG | Access Control (5 rules)"
  ansible.builtin.import_tasks: access_control.yml
  tags:
    - access_control

- name: "PANW-AG | Authentication (1 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "PANW-AG | Authorization (11 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "PANW-AG | Encryption (7 rules)"
  ansible.builtin.import_tasks: encryption.yml
  tags:
    - encryption

- name: "PANW-AG | Logging (17 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "PANW-AG | Network Services (6 rules)"
  ansible.builtin.import_tasks: network_services.yml
  tags:
    - network_services

- name: "PANW-AG | Routing (1 rules)"
  ansible.builtin.import_tasks: routing.yml
  tags:
    - routing

- name: "PANW-AG | Session Management (1 rules)"
  ansible.builtin.import_tasks: session_management.yml
  tags:
    - session_management

- name: "PANW-AG | System Hardening (1 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
