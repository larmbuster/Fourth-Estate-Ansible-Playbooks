---
# =========================================
# F5 DISA STIG Hardening Playbook
# Entry point for all F5 STIG automation
#
# Usage:
#   ansible-galaxy collection install -r requirements.yml
#   ansible-playbook -i inventory stig_site.yml
#   ansible-playbook -i inventory stig_site.yml --tags cat1
# =========================================

# --- F5 BIG-IP STIGs ---
- name: F5 BIG-IP ALG STIG Hardening
  hosts: f5_bigip_devices
  gather_facts: false
  roles:
    - role: f5_bigip_alg_stig

- name: F5 BIG-IP DNS STIG Hardening
  hosts: f5_bigip_devices
  gather_facts: false
  roles:
    - role: f5_bigip_dns_stig

- name: F5 BIG-IP Firewall STIG Hardening
  hosts: f5_bigip_devices
  gather_facts: false
  roles:
    - role: f5_bigip_fw_stig

- name: F5 BIG-IP NDM STIG Hardening
  hosts: f5_bigip_devices
  gather_facts: false
  roles:
    - role: f5_bigip_ndm_stig

- name: F5 BIG-IP VPN STIG Hardening
  hosts: f5_bigip_devices
  gather_facts: false
  roles:
    - role: f5_bigip_vpn_stig

# --- F5 NGINX STIG ---
- name: F5 NGINX STIG Hardening
  hosts: nginx_servers
  gather_facts: true
  roles:
    - role: f5_nginx_stig

# =========================================
# Summary Play
# =========================================
- name: F5 STIG Hardening Summary
  hosts: all
  gather_facts: false
  tags:
    - always

  tasks:
    - name: Display hardening summary
      ansible.builtin.debug:
        msg:
          - "================================================"
          - "F5 DISA STIG hardening complete"
          - "Target: {{ inventory_hostname }}"
          - "================================================"
          - "Review any verification tasks that reported findings."
          - "Manual checks require administrator review."
          - "================================================"
