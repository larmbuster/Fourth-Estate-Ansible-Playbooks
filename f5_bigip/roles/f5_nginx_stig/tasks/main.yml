---
# =========================================
# F5 NGINX Web Server DISA STIG V1 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 32 (CAT I: 2, CAT II: 30, CAT III: 0)
#
# Usage:
#   --tags access_control           (2 rules)
#   --tags authentication           (7 rules)
#   --tags authorization            (6 rules)
#   --tags encryption               (5 rules)
#   --tags logging                  (2 rules)
#   --tags network_services         (7 rules)
#   --tags session_management       (3 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags NGNX-APP-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is F5 NGINX"
  ansible.builtin.assert:
    that:
      - ansible_os_family is defined
    fail_msg: >-
      This role targets F5 NGINX only.
    quiet: true
  tags:
    - always

- name: "NGNX-APP | Access Control (2 rules)"
  ansible.builtin.import_tasks: access_control.yml
  tags:
    - access_control

- name: "NGNX-APP | Authentication (7 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "NGNX-APP | Authorization (6 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "NGNX-APP | Encryption (5 rules)"
  ansible.builtin.import_tasks: encryption.yml
  tags:
    - encryption

- name: "NGNX-APP | Logging (2 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "NGNX-APP | Network Services (7 rules)"
  ansible.builtin.import_tasks: network_services.yml
  tags:
    - network_services

- name: "NGNX-APP | Session Management (3 rules)"
  ansible.builtin.import_tasks: session_management.yml
  tags:
    - session_management
