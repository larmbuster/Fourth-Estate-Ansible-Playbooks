---
# =========================================
# F5 BIG-IP ALG DISA STIG V1 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 37 (CAT I: 9, CAT II: 23, CAT III: 5)
#
# Usage:
#   --tags access_control           (4 rules)
#   --tags authentication           (8 rules)
#   --tags authorization            (3 rules)
#   --tags encryption               (4 rules)
#   --tags logging                  (2 rules)
#   --tags network_services         (5 rules)
#   --tags session_management       (5 rules)
#   --tags system_hardening         (6 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags F5BI-AP-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is F5 BIG-IP"
  ansible.builtin.assert:
    that:
      - ansible_connection == "local" or ansible_connection == "httpapi"
    fail_msg: >-
      This role targets F5 BIG-IP only.
    quiet: true
  tags:
    - always

- name: "F5BI-AP | Access Control (4 rules)"
  ansible.builtin.import_tasks: access_control.yml
  tags:
    - access_control

- name: "F5BI-AP | Authentication (8 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "F5BI-AP | Authorization (3 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "F5BI-AP | Encryption (4 rules)"
  ansible.builtin.import_tasks: encryption.yml
  tags:
    - encryption

- name: "F5BI-AP | Logging (2 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "F5BI-AP | Network Services (5 rules)"
  ansible.builtin.import_tasks: network_services.yml
  tags:
    - network_services

- name: "F5BI-AP | Session Management (5 rules)"
  ansible.builtin.import_tasks: session_management.yml
  tags:
    - session_management

- name: "F5BI-AP | System Hardening (6 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
