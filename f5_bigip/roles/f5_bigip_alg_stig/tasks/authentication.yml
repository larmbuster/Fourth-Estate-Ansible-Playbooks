    key: "{{ f5_bigip_alg_stig_f5bi_ap_300006_key }}"
    value: "{{ f5_bigip_alg_stig_f5bi_ap_300006_value }}"
  notify: Save F5 configuration
  tags:
    - F5BI-AP-300006
    - cat2
    - authentication

