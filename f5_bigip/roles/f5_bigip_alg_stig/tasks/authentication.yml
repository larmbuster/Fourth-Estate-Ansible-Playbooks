# F5BI-AP-300047 - HIGH
# -----------------------------------------

- name: "F5BI-AP-300047 | The F5 BIG-IP appliance providing user authentication intermediary services must uniquely identify and authenticate users using redundant authentication servers and multifactor authentication (MFA)."
