---
# =========================================
# F5 BIG-IP NDM DISA STIG V1 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 29 (CAT I: 8, CAT II: 20, CAT III: 1)
#
# Usage:
#   --tags authentication           (16 rules)
#   --tags authorization            (2 rules)
#   --tags logging                  (5 rules)
#   --tags session_management       (3 rules)
#   --tags system_hardening         (3 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags F5BI-DM-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is F5 BIG-IP"
  ansible.builtin.assert:
    that:
      - ansible_connection == "local" or ansible_connection == "httpapi"
    fail_msg: >-
      This role targets F5 BIG-IP only.
    quiet: true
  tags:
    - always

- name: "F5BI-DM | Authentication (16 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "F5BI-DM | Authorization (2 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "F5BI-DM | Logging (5 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "F5BI-DM | Session Management (3 rules)"
  ansible.builtin.import_tasks: session_management.yml
  tags:
    - session_management

- name: "F5BI-DM | System Hardening (3 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
