---
# =========================================
# Cisco DISA STIG Hardening Playbook
# Entry point for all Cisco STIG automation
#
# Usage:
#   ansible-galaxy collection install -r requirements.yml
#   ansible-playbook -i inventory stig_site.yml
#   ansible-playbook -i inventory stig_site.yml --tags cat1
#   ansible-playbook -i inventory stig_site.yml --limit cisco_ios_routers
# =========================================

# --- Cisco IOS Router STIGs ---
- name: Cisco IOS Router NDM STIG Hardening
  hosts: cisco_ios_routers
  gather_facts: false
  roles:
    - role: cisco_ios_router_ndm_stig

- name: Cisco IOS Router RTR STIG Hardening
  hosts: cisco_ios_routers
  gather_facts: false
  roles:
    - role: cisco_ios_router_rtr_stig

# --- Cisco IOS Switch STIGs ---
- name: Cisco IOS Switch L2S STIG Hardening
  hosts: cisco_ios_switches
  gather_facts: false
  roles:
