- name: Cisco IOS Switch NDM STIG Hardening
  hosts: cisco_ios_switches
  gather_facts: false
  roles:
    - role: cisco_ios_switch_ndm_stig

- name: Cisco IOS Switch RTR STIG Hardening
  hosts: cisco_ios_switches
  gather_facts: false
  roles:
    - role: cisco_ios_switch_rtr_stig

