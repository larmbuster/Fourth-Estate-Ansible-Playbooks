    msg: "VERIFY: If DoD is not at C2C Step 1 or higher, this is not a finding. Verify that logging targets are configured to buffer syslog messages when the server is down. From the Web Admin portal: 1. Choose Admi..."
  tags:
    - CSCO-NC-000240
    - cat2
    - logging

