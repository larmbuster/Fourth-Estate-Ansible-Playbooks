# -----------------------------------------
# CSCO-NC-000170 - MEDIUM
# -----------------------------------------

- name: "CSCO-NC-000170 | The Cisco ISE must send an alert to the system administrator, at a minimum, when endpoints fail the policy assessment checks for organization-defined infractions. This is required for compliance wi..."
  cisco.ise.admin_user:
    ise_hostname: "{{ cisco_ise_nac_stig_ise_hostname }}"
    ise_username: "{{ cisco_ise_nac_stig_ise_username }}"
    ise_password: "{{ cisco_ise_nac_stig_ise_password }}"
