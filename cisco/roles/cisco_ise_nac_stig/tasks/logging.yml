---
# =========================================
# Cisco ISE NAC STIG - Logging
# 8 rules
# =========================================

# -----------------------------------------
# CSCO-NC-000100 - MEDIUM
# -----------------------------------------

- name: "CSCO-NC-000100 | The Cisco ISE must send an alert to the Information System Security Manager (ISSM) and System Administrator (SA), at a minimum, when security issues are found that put the network at risk. This is ..."
  cisco.ise.admin_user:
    ise_hostname: "{{ cisco_ise_nac_stig_ise_hostname }}"
    ise_username: "{{ cisco_ise_nac_stig_ise_username }}"
    ise_password: "{{ cisco_ise_nac_stig_ise_password }}"
    name: "{{ cisco_ise_nac_stig_admin_username | default('admin') }}"
    state: present
  notify: Commit ISE configuration
  tags:
    - CSCO-NC-000100
    - cat2
    - logging

# -----------------------------------------
# CSCO-NC-000150 - MEDIUM
# -----------------------------------------

- name: "CSCO-NC-000150 | The Cisco ISE must generate a log record when an endpoint fails authentication. This is This is required for compliance with C2C Step 1."
  cisco.ise.syslog_server:
    ise_hostname: "{{ cisco_ise_nac_stig_ise_hostname }}"
    ise_username: "{{ cisco_ise_nac_stig_ise_username }}"
    ise_password: "{{ cisco_ise_nac_stig_ise_password }}"
    name: "{{ cisco_ise_nac_stig_syslog_server }}"
    host: "{{ cisco_ise_nac_stig_syslog_server }}"
    state: present
  notify: Commit ISE configuration
  tags:
    - CSCO-NC-000150
    - cat2
    - logging

# -----------------------------------------
# CSCO-NC-000160 - MEDIUM
# -----------------------------------------

- name: "CSCO-NC-000160 | The Cisco ISE must generate a log record when the client machine fails posture assessment because required security software is missing or has been deleted. This is This is required for compliance ..."
