# -----------------------------------------
# CSCO-NC-000200 - MEDIUM
# -----------------------------------------

- name: "CSCO-NC-000200 | The Cisco ISE must generate a critical alert to be sent to the ISSO and SA (at a minimum) in the event of an audit processing failure. This is required for compliance with C2C Step 1."
  cisco.ise.network_device:
    ise_hostname: "{{ cisco_ise_nac_stig_ise_hostname }}"
    ise_username: "{{ cisco_ise_nac_stig_ise_username }}"
    ise_password: "{{ cisco_ise_nac_stig_ise_password }}"
    name: "{{ cisco_ise_nac_stig_network_device | default('stig-device') }}"
    state: present
  notify: Commit ISE configuration
  tags:
    - CSCO-NC-000200
    - cat2
    - logging

# -----------------------------------------
# CSCO-NC-000210 - MEDIUM
# -----------------------------------------

- name: "CSCO-NC-000210 | The Cisco ISE must provide an alert to, at a minimum, the SA and ISSO of all audit failure events where the detection and/or prevention function is unable to write events to either local storage or..."
  cisco.ise.network_device:
