---
# =========================================
# Cisco ISE NAC STIG - System Hardening
# 5 rules
# =========================================

# -----------------------------------------
# CSCO-NC-000080 - LOW
# -----------------------------------------

- name: "CSCO-NC-000080 | The Cisco ISE must be configured to notify the user before proceeding with remediation of the user's endpoint device when automated remediation is used. This is required for compliance with C2C Ste..."
  cisco.ise.admin_user:
    ise_hostname: "{{ cisco_ise_nac_stig_ise_hostname }}"
    ise_username: "{{ cisco_ise_nac_stig_ise_username }}"
    ise_password: "{{ cisco_ise_nac_stig_ise_password }}"
    name: "{{ cisco_ise_nac_stig_admin_username | default('admin') }}"
    state: present
  notify: Commit ISE configuration
  tags:
    - CSCO-NC-000080
    - cat3
    - system_hardening

# -----------------------------------------
# CSCO-NC-000090 - MEDIUM
# -----------------------------------------

- name: "CSCO-NC-000090 | VERIFY - The Cisco ISE must be configured so that all endpoints that are allowed to bypass policy assessment are approved by the Information System Security Manager (ISSM) and documented in the System Secur..."
  ansible.builtin.debug:
    msg: "VERIFY: If DoD is not at C2C Step 1 or higher, this is not a finding. If not required by the NAC SSP, this is not a finding. Review the posture policy to ensure mandated endpoints are being assed and if th..."
  tags:
    - CSCO-NC-000090
    - cat2
    - system_hardening

# -----------------------------------------
# CSCO-NC-000110 - MEDIUM
# -----------------------------------------

- name: "CSCO-NC-000110 | When endpoints fail the policy assessment, the Cisco ISE must create a record with sufficient detail suitable for forwarding to a remediation server for automated remediation or sending to the user..."
  cisco.ise.admin_user:
    ise_hostname: "{{ cisco_ise_nac_stig_ise_hostname }}"
    ise_username: "{{ cisco_ise_nac_stig_ise_username }}"
    ise_password: "{{ cisco_ise_nac_stig_ise_password }}"
    name: "{{ cisco_ise_nac_stig_admin_username | default('admin') }}"
    state: present
  notify: Commit ISE configuration
  tags:
    - CSCO-NC-000110
    - cat2
    - system_hardening

# -----------------------------------------
# CSCO-NC-000250 - MEDIUM
# -----------------------------------------

- name: "CSCO-NC-000250 | VERIFY - The Cisco ISE must perform continuous detection and tracking of endpoint devices attached to the network. This is required for compliance with C2C Step 1."
  ansible.builtin.debug:
    msg: "VERIFY: If DoD is not at C2C Step 1 or higher, this is not a finding. If not required by the NAC SSP, this is not a finding. Review the posture settings to ensure Continuous Monitoring Interval is enabled ..."
  tags:
    - CSCO-NC-000250
    - cat2
    - system_hardening

# -----------------------------------------
# CSCO-NC-000320 - HIGH
# -----------------------------------------

- name: "CSCO-NC-000320 | VERIFY - The Cisco ISE must have a posture policy for posture required clients defined in the NAC System Security Plan (SSP). This is required for compliance with C2C Step 2."
  ansible.builtin.debug:
    msg: "VERIFY: If DOD is not at C2C Step 2 or higher, this is not a finding. If not required by the NAC SSP, this is not a finding. Verify the posture policy for posture required clients. 1. Navigate to Work Cent..."
  tags:
    - CSCO-NC-000320
    - cat1
    - system_hardening

