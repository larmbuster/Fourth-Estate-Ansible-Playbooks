---
# =========================================
# Cisco ASA IPS DISA STIG V2 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 23 (CAT I: 0, CAT II: 23, CAT III: 0)
#
# Usage:
#   --tags access_control           (1 rules)
#   --tags authorization            (2 rules)
#   --tags logging                  (14 rules)
#   --tags network_services         (5 rules)
#   --tags system_hardening         (1 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags CASA-IP-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is Cisco ASA"
  ansible.builtin.assert:
    that:
      - ansible_network_os == "cisco.asa.asa"
    fail_msg: >-
      This role targets Cisco ASA only.
    quiet: true
  tags:
    - always

- name: "CASA-IP | Access Control (1 rules)"
  ansible.builtin.import_tasks: access_control.yml
  tags:
    - access_control

- name: "CASA-IP | Authorization (2 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "CASA-IP | Logging (14 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "CASA-IP | Network Services (5 rules)"
  ansible.builtin.import_tasks: network_services.yml
  tags:
    - network_services

- name: "CASA-IP | System Hardening (1 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
