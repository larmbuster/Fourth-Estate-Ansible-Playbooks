  tags:
    - CACI-RT-000003
    - cat2
    - routing

# -----------------------------------------
# CACI-RT-000004 - LOW
# -----------------------------------------

- name: "CACI-RT-000004 | The BGP Cisco ACI must be configured to reject route advertisements from BGP peers that do not list their autonomous system (AS) number as the first AS in the AS_PATH attribute."
