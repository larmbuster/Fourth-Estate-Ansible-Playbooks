---
# =========================================
# Cisco ACI RTR STIG - Routing
# 9 rules
# =========================================

# -----------------------------------------
# CACI-RT-000002 - MEDIUM
# -----------------------------------------

- name: "CACI-RT-000002 | The BGP Cisco ACI must be configured to reject inbound route advertisements for any prefixes belonging to the local autonomous system (AS)."
  cisco.aci.aci_rest:
    path: "{{ cisco_aci_rtr_stig_caci_rt_000002_api_path | default('/api/mo/uni.json') }}"
    method: post
    content: "{{ cisco_aci_rtr_stig_caci_rt_000002_content | default({}) }}"
  notify: Commit ACI configuration
  tags:
    - CACI-RT-000002
    - cat2
    - routing

# -----------------------------------------
# CACI-RT-000003 - MEDIUM
# -----------------------------------------

- name: "CACI-RT-000003 | The BGP Cisco ACI must be configured to reject outbound route advertisements for any prefixes that do not belong to any customers or the local autonomous system (AS)."
  cisco.aci.aci_rest:
    path: "{{ cisco_aci_rtr_stig_caci_rt_000003_api_path | default('/api/mo/uni.json') }}"
