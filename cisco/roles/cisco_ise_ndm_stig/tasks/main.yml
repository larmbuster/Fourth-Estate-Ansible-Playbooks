---
# =========================================
# Cisco ISE NDM DISA STIG V2 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 53 (CAT I: 9, CAT II: 41, CAT III: 3)
#
# Usage:
#   --tags access_control           (1 rules)
#   --tags authentication           (16 rules)
#   --tags authorization            (2 rules)
#   --tags encryption               (5 rules)
#   --tags logging                  (22 rules)
#   --tags session_management       (2 rules)
#   --tags system_hardening         (5 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags CSCO-NM-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is Cisco ISE"
  ansible.builtin.assert:
    that:
      - ise_hostname is defined
    fail_msg: >-
      This role targets Cisco ISE only.
    quiet: true
  tags:
    - always

- name: "CSCO-NM | Access Control (1 rules)"
  ansible.builtin.import_tasks: access_control.yml
  tags:
    - access_control

- name: "CSCO-NM | Authentication (16 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "CSCO-NM | Authorization (2 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "CSCO-NM | Encryption (5 rules)"
  ansible.builtin.import_tasks: encryption.yml
  tags:
    - encryption

- name: "CSCO-NM | Logging (22 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "CSCO-NM | Session Management (2 rules)"
  ansible.builtin.import_tasks: session_management.yml
  tags:
    - session_management

- name: "CSCO-NM | System Hardening (5 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
