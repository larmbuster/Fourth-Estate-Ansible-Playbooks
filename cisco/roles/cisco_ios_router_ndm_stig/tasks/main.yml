---
# =========================================
# Cisco IOS Router NDM DISA STIG V3 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 43 (CAT I: 8, CAT II: 35, CAT III: 0)
#
# Usage:
#   --tags access_control           (3 rules)
#   --tags authentication           (12 rules)
#   --tags authorization            (4 rules)
#   --tags encryption               (5 rules)
#   --tags logging                  (14 rules)
#   --tags network_services         (1 rules)
#   --tags routing                  (1 rules)
#   --tags session_management       (2 rules)
#   --tags system_hardening         (1 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags CISC-ND-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is Cisco IOS Router"
  ansible.builtin.assert:
    that:
      - ansible_network_os == "cisco.ios.ios"
    fail_msg: >-
      This role targets Cisco IOS Router only.
    quiet: true
  tags:
    - always

- name: "CISC-ND | Access Control (3 rules)"
  ansible.builtin.import_tasks: access_control.yml
  tags:
    - access_control

- name: "CISC-ND | Authentication (12 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "CISC-ND | Authorization (4 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "CISC-ND | Encryption (5 rules)"
  ansible.builtin.import_tasks: encryption.yml
  tags:
    - encryption

- name: "CISC-ND | Logging (14 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "CISC-ND | Network Services (1 rules)"
  ansible.builtin.import_tasks: network_services.yml
  tags:
    - network_services

- name: "CISC-ND | Routing (1 rules)"
  ansible.builtin.import_tasks: routing.yml
  tags:
    - routing

- name: "CISC-ND | Session Management (2 rules)"
  ansible.builtin.import_tasks: session_management.yml
  tags:
    - session_management

- name: "CISC-ND | System Hardening (1 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
