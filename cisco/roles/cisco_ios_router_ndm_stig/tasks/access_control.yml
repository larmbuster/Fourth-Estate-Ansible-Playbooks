---
# =========================================
# Cisco IOS Router NDM STIG - Access Control
# 3 rules
# =========================================

# -----------------------------------------
# CISC-ND-000140 - MEDIUM
# -----------------------------------------

- name: "CISC-ND-000140 | The Cisco router must be configured to enforce approved authorizations for controlling the flow of management information within the device based on control policies."
  cisco.ios.ios_acls:
    config: "{{ cisco_ios_router_ndm_stig_acl_config | default([]) }}"
    state: merged
  notify: Save running configuration
  tags:
    - CISC-ND-000140
    - cat2
    - access_control

# -----------------------------------------
# CISC-ND-000290 - MEDIUM
# -----------------------------------------

- name: "CISC-ND-000290 | The Cisco router must produce audit records containing information to establish where the events occurred."
  cisco.ios.ios_acls:
    config: "{{ cisco_ios_router_ndm_stig_acl_config | default([]) }}"
    state: merged
  notify: Save running configuration
  tags:
    - CISC-ND-000290
    - cat2
    - access_control

# -----------------------------------------
# CISC-ND-001220 - MEDIUM
# -----------------------------------------

- name: "CISC-ND-001220 | The Cisco router must be configured to protect against known types of denial-of-service (DoS) attacks by employing organization-defined security safeguards."
  cisco.ios.ios_ntp_global:
    config:
      servers:
        - server: "{{ cisco_ios_router_ndm_stig_ntp_server_primary }}"
    state: merged
  notify: Save running configuration
  tags:
    - CISC-ND-001220
    - cat2
    - access_control

