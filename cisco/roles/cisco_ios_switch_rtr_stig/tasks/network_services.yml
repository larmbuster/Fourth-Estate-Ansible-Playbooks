---
# =========================================
# Cisco IOS Switch RTR STIG - Network Services
# 6 rules
# =========================================

# -----------------------------------------
# CISC-RT-000160 - LOW
# -----------------------------------------

- name: "CISC-RT-000160 | The Cisco switch must be configured to have IP directed broadcast disabled on all interfaces."
  cisco.ios.ios_config:
    lines:
      - "no ip directed-broadcast"
      - "no ip directed-broadcast"
  notify: Save running configuration
  tags:
    - CISC-RT-000160
    - cat3
    - network_services

# -----------------------------------------
# CISC-RT-000380 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000380 | The Cisco perimeter switch must be configured to have Proxy ARP disabled on all external interfaces."
  cisco.ios.ios_config:
    lines:
      - "no ip proxy-arp"
  notify: Save running configuration
  tags:
    - CISC-RT-000380
    - cat2
    - network_services

# -----------------------------------------
# CISC-RT-000760 - LOW
# -----------------------------------------

- name: "CISC-RT-000760 | The Cisco PE switch must be configured to enforce a Quality-of-Service (QoS) policy to provide preferred treatment for mission-critical applications."
  cisco.ios.ios_config:
    lines:
      - "class-map match-all PREFERRED_DATA"
      - "match ip dscp af33"
      - "class-map match-all CONTROL_PLANE"
      - "match ip dscp cs6"
      - "class-map match-all VIDEO"
  notify: Save running configuration
  tags:
    - CISC-RT-000760
    - cat3
    - network_services

# -----------------------------------------
# CISC-RT-000770 - LOW
# -----------------------------------------

- name: "CISC-RT-000770 | The Cisco P switch must be configured to enforce a Quality-of-Service (QoS) policy to provide preferred treatment for mission-critical applications."
  cisco.ios.ios_config:
    lines:
      - "class-map match-all PREFERRED_DATA"
      - "match ip dscp af33"
      - "class-map match-all CONTROL_PLANE"
      - "match ip dscp cs6"
      - "class-map match-all VIDEO"
  notify: Save running configuration
  tags:
    - CISC-RT-000770
    - cat3
    - network_services

# -----------------------------------------
# CISC-RT-000780 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000780 | The Cisco switch must be configured to enforce a Quality-of-Service (QoS) policy to limit the effects of packet flooding denial-of-service (DoS) attacks."
  cisco.ios.ios_config:
    lines:
      - "class-map match-all SCAVENGER"
      - "match ip dscp cs1"
      - "policy-map QOS_POLICY"
      - "no class class-default"
  notify: Save running configuration
  tags:
    - CISC-RT-000780
    - cat2
    - network_services

# -----------------------------------------
# CISC-RT-000880 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000880 | The Cisco multicast Designated switch (DR) must be configured to limit the number of mroute states resulting from Internet Group Management Protocol (IGMP) and Multicast Listener Discovery (MLD) Ho..."
  cisco.ios.ios_config:
    lines:
      - "ip igmp limit 2"
  notify: Save running configuration
  tags:
    - CISC-RT-000880
    - cat2
    - network_services

