---
# =========================================
# Cisco IOS Switch RTR STIG - Authentication
# 2 rules
# =========================================

# -----------------------------------------
# CISC-RT-000230 - LOW
# -----------------------------------------

- name: "CISC-RT-000230 | The Cisco switch must be configured to disable the auxiliary port unless it is connected to a secured modem providing encryption and authentication."
  cisco.ios.ios_config:
    lines:
      - "line aux 0"
      - "no exec"
      - "transport input none"
  notify: Save running configuration
  tags:
    - CISC-RT-000230
    - cat3
    - authentication

# -----------------------------------------
# CISC-RT-000660 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000660 | MANUAL CHECK - The Cisco PE switch providing MPLS Layer 2 Virtual Private Network (L2VPN) services must be configured to authenticate targeted Label Distribution Pro"
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Review STIG fixtext and configure the device CLI as required."
  tags:
    - CISC-RT-000660
    - cat2
    - authentication

