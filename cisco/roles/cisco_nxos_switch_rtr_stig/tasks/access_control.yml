# -----------------------------------------
# CISC-RT-000820 - LOW
# -----------------------------------------

- name: "CISC-RT-000820 | The Cisco multicast Rendezvous Point (RP) switch must be configured to limit the multicast forwarding cache so that its resources are not saturated by managing an overwhelming number of Protocol In..."
  cisco.nxos.nxos_acls:
    config: "{{ cisco_nxos_switch_rtr_stig_acl_config | default([]) }}"
    state: merged
  notify: Save running configuration
  tags:
    - CISC-RT-000820
    - cat3
    - access_control

# -----------------------------------------
# CISC-RT-000830 - LOW
# -----------------------------------------

- name: "CISC-RT-000830 | The Cisco multicast Rendezvous Point (RP) switch must be configured to filter Protocol Independent Multicast (PIM) Register messages received from the Designated switch (DR) for any undesirable mul..."
  cisco.nxos.nxos_config:
    lines:
      - "route-map PIM_REGISTER_FILTER deny 10"
      - "match ip multicast group 239.5.0.0/16"
      - "route-map PIM_REGISTER_FILTER permit 20"
      - "match ip multicast source {{ peer_address }}/32"
      - "route-map PIM_REGISTER_FILTER permit 30"
  notify: Save running configuration
  tags:
    - CISC-RT-000830
    - cat3
    - access_control

# -----------------------------------------
# CISC-RT-000840 - LOW
# -----------------------------------------

- name: "CISC-RT-000840 | The Cisco multicast Rendezvous Point (RP) switch must be configured to filter Protocol Independent Multicast (PIM) Join messages received from the Designated Cisco switch (DR) for any undesirable m..."
  cisco.nxos.nxos_config:
    lines:
      - "route-map PIM_JOIN_FILTER deny"
      - "match ip multicast group 239.8.0.0/8"
      - "route-map PIM_JOIN_FILTER permit 20"
      - "match ip multicast group 224.0.0.0/4"
      - "ip pim jp-policy PIM_JOIN_FILTER in"
  notify: Save running configuration
  tags:
    - CISC-RT-000840
    - cat3
    - access_control

# -----------------------------------------
# CISC-RT-000860 - LOW
# -----------------------------------------

- name: "CISC-RT-000860 | The Cisco multicast Designated switch (DR) must be configured to filter the Internet Group Management Protocol (IGMP) and Multicast Listener Discovery (MLD) Report messages to allow hosts to join o..."
  cisco.nxos.nxos_config:
    lines:
      - "route-map ALLOWED_GROUPS permit"
      - "match ip multicast group 233.1.1.0/24"
      - "route-map ALLOWED_GROUPS permit 20"
      - "match ip multicast group 233.1.1.0/32"
      - "route-map ALLOWED_GROUPS permit 30"
  notify: Save running configuration
  tags:
    - CISC-RT-000860
    - cat3
    - access_control

# -----------------------------------------
# CISC-RT-000870 - MEDIUM
