# -----------------------------------------
# CISC-RT-000800 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000800 | MANUAL CHECK - The Cisco multicast switch must be configured to bind a Protocol Independent Multicast (PIM) neighbor filter to interfaces that have PIM enabled."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Configure neighbor prefix lists to only accept PIM control plane traffic from documented PIM neighbors. Step 1: Configure prefix list for each PIM neighbor. SW1(config)# ip prefix-list PIM_NEIGHBOR..."
  tags:
    - CISC-RT-000800
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000810 - LOW
# -----------------------------------------

- name: "CISC-RT-000810 | The Cisco multicast edge switch must be configured to establish boundaries for administratively scoped multicast traffic."
  cisco.nxos.nxos_acls:
