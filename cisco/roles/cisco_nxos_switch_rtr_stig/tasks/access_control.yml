# -----------------------------------------
# CISC-RT-000310 - HIGH
# -----------------------------------------

- name: "CISC-RT-000310 | The Cisco perimeter switch must be configured to restrict it from accepting outbound IP packets that contain an illegitimate address in the source address field via egress filter or by enabling Uni..."
  cisco.nxos.nxos_config:
    lines:
      - "ip verify unicast source reachable-via rx"
  notify: Save running configuration
  tags:
    - CISC-RT-000310
    - cat1
    - access_control

# -----------------------------------------
# CISC-RT-000320 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000320 | The Cisco perimeter switch must be configured to filter traffic destined to the enclave in accordance with the guidelines contained in DoD Instruction 8551.1."
  cisco.nxos.nxos_acls:
    config: "{{ cisco_nxos_switch_rtr_stig_acl_config | default([]) }}"
    state: merged
  notify: Save running configuration
  tags:
