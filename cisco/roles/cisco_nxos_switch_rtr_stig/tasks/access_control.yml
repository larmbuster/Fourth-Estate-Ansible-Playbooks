- name: "CISC-RT-000330 | The Cisco perimeter switch must be configured to filter ingress traffic at the external interface on an inbound direction."
  cisco.nxos.nxos_config:
    lines:
      - "ip access-group EXTERNAL_ACL in"
  notify: Save running configuration
  tags:
    - CISC-RT-000330
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000340 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000340 | The Cisco perimeter switch must be configured to filter egress traffic at the internal interface on an inbound direction."
  cisco.nxos.nxos_config:
    lines:
      - "ip access-group EGRESS_FILTER in"
  notify: Save running configuration
  tags:
    - CISC-RT-000340
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000360 - LOW
