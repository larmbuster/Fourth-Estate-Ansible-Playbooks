  notify: Save running configuration
  tags:
    - CISC-RT-000360
    - cat3
    - access_control

# -----------------------------------------
# CISC-RT-000370 - LOW
# -----------------------------------------

- name: "CISC-RT-000370 | MANUAL CHECK - The Cisco perimeter switch must be configured to have Cisco Discovery Protocol (CDP) disabled on all external interfaces."
  ansible.builtin.debug:
