  notify: Save running configuration
  tags:
    - CISC-RT-000190
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000200 - LOW
# -----------------------------------------

- name: "CISC-RT-000200 | The Cisco switch must be configured to log all packets that have been dropped at interfaces via an ACL."
  cisco.nxos.nxos_acls:
