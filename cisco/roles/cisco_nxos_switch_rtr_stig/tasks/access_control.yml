# -----------------------------------------
# CISC-RT-000270 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000270 | The Cisco perimeter switch must be configured to block inbound packets with source Bogon IP address prefixes."
  cisco.nxos.nxos_acls:
    config: "{{ cisco_nxos_switch_rtr_stig_acl_config | default([]) }}"
    state: merged
  notify: Save running configuration
  tags:
