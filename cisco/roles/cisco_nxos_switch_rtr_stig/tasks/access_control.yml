# -----------------------------------------
# CISC-RT-000250 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000250 | The Cisco perimeter switch must be configured to enforce approved authorizations for controlling the flow of information between interconnected networks in accordance with applicable policy."
  cisco.nxos.nxos_acls:
