- name: "CISC-RT-000870 | The Cisco multicast Designated switch (DR) must be configured to filter the Internet Group Management Protocol (IGMP) and Multicast Listener Discovery (MLD) Report messages to allow hosts to join a..."
  cisco.nxos.nxos_config:
    lines:
      - "route-map ALLOWED_SOURCES permit 10"
      - "match ip multicast source {{ peer_address }}/32"
      - "route-map ALLOWED_SOURCES permit 20"
      - "match ip multicast source {{ peer_address }}/32"
      - "route-map ALLOWED_SOURCES deny 30"
  notify: Save running configuration
  tags:
    - CISC-RT-000870
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000900 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000900 | The Cisco Multicast Source Discovery Protocol (MSDP) switch must be configured to only accept MSDP packets from known MSDP peers."
  cisco.nxos.nxos_acls:
    config: "{{ cisco_nxos_switch_rtr_stig_acl_config | default([]) }}"
    state: merged
  notify: Save running configuration
  tags:
    - CISC-RT-000900
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000920 - LOW
# -----------------------------------------

- name: "CISC-RT-000920 | The Cisco Multicast Source Discovery Protocol (MSDP) switch must be configured to filter received source-active multicast advertisements for any undesirable multicast groups and sources."
  cisco.nxos.nxos_config:
    lines:
      - "ip prefix-list INBOUND_MSDP_SA_FILTER seq 10 deny 224.0.1.3/32"
      - "ip prefix-list INBOUND_MSDP_SA_FILTER seq 15 deny 224.0.1.24/32"
      - "ip prefix-list INBOUND_MSDP_SA_FILTER seq 20 deny 224.0.1.22/32"
      - "ip prefix-list INBOUND_MSDP_SA_FILTER seq 25 deny 224.0.1.2/32"
      - "ip prefix-list INBOUND_MSDP_SA_FILTER seq 30 deny 224.0.1.35/32"
  notify: Save running configuration
  tags:
    - CISC-RT-000920
    - cat3
    - access_control

# -----------------------------------------
# CISC-RT-000930 - LOW
# -----------------------------------------

- name: "CISC-RT-000930 | The Cisco Multicast Source Discovery Protocol (MSDP) switch must be configured to filter source-active multicast advertisements to external MSDP peers to avoid global visibility of local-only multi..."
  cisco.nxos.nxos_config:
    lines:
      - "ip prefix-list OUTBOUND_MSDP_SA_FILTER seq 10 deny 10.0.0.0/8 le 32"
      - "ip prefix-list OUTBOUND_MSDP_SA_FILTER seq 20 permit 0.0.0.0/0 ge 8"
      - "ip msdp sa-policy {{ peer_address }} prefix-list OUTBOUND_MSDP_SA_FILTER out"
  notify: Save running configuration
  tags:
    - CISC-RT-000930
    - cat3
    - access_control

# -----------------------------------------
# CISC-RT-000236 - LOW
# -----------------------------------------

- name: "CISC-RT-000236 | The Cisco switch must be configured to advertise a hop limit of at least 32 in Switch Advertisement messages for IPv6 stateless auto-configuration deployments."
  cisco.nxos.nxos_config:
    lines:
      - "interface e2/1 – 2"
      - "ipv6 nd hop-limit 32"
  notify: Save running configuration
  tags:
    - CISC-RT-000236
    - cat3
    - access_control

# -----------------------------------------
# CISC-RT-000391 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000391 | The Cisco perimeter switch must be configured to suppress Router Advertisements on all external IPv6-enabled interfaces."
  cisco.nxos.nxos_config:
    lines:
      - "interface e1/1"
      - "ipv6 nd suppress-ra"
  notify: Save running configuration
  tags:
    - CISC-RT-000391
    - cat2
    - access_control

