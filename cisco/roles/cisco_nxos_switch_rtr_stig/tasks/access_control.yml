---
# =========================================
# Cisco NX-OS Switch RTR STIG - Access Control
# 35 rules
# =========================================

# -----------------------------------------
# CISC-RT-000010 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000010 | The Cisco switch must be configured to enforce approved authorizations for controlling the flow of information within the network based on organization-defined information flow control policies."
  cisco.nxos.nxos_acls:
    config: "{{ cisco_nxos_switch_rtr_stig_acl_config | default([]) }}"
    state: merged
  notify: Save running configuration
  tags:
    - CISC-RT-000010
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000060 - LOW
# -----------------------------------------

- name: "CISC-RT-000060 | The Cisco switch must be configured to have all inactive layer 3 interfaces disabled."
  cisco.nxos.nxos_config:
    lines:
      - "shutdown"
  notify: Save running configuration
  tags:
    - CISC-RT-000060
    - cat3
    - access_control

# -----------------------------------------
# CISC-RT-000120 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000120 | The Cisco switch must be configured to protect against or limit the effects of denial-of-service (DoS) attacks by employing control plane protection."
  cisco.nxos.nxos_acls:
    config: "{{ cisco_nxos_switch_rtr_stig_acl_config | default([]) }}"
    state: merged
  notify: Save running configuration
  tags:
    - CISC-RT-000120
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000140 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000140 | The Cisco switch must be configured to drop all fragmented Internet Control Message Protocol (ICMP) packets destined to itself."
  cisco.nxos.nxos_acls:
    config: "{{ cisco_nxos_switch_rtr_stig_acl_config | default([]) }}"
    state: merged
  notify: Save running configuration
  tags:
    - CISC-RT-000140
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000150 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000150 | The Cisco switch must be configured to have Gratuitous ARP disabled on all external interfaces."
  cisco.nxos.nxos_config:
    lines:
      - "no ip arp gratuitous request"
  notify: Save running configuration
  tags:
    - CISC-RT-000150
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000170 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000170 | The Cisco switch must be configured to have Internet Control Message Protocol (ICMP) unreachable messages disabled on all external interfaces."
  cisco.nxos.nxos_config:
    lines:
      - "no ip unreachables"
  notify: Save running configuration
  tags:
    - CISC-RT-000170
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000190 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000190 | The Cisco switch must be configured to have Internet Control Message Protocol (ICMP) redirect messages disabled on all external interfaces."
