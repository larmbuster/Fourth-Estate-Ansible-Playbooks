---
# =========================================
# Cisco ASA NDM STIG - System Hardening
# 3 rules
# =========================================

# -----------------------------------------
# CASA-ND-000430 - HIGH
# -----------------------------------------

- name: "CASA-ND-000430 | The Cisco ASA must be configured to prohibit the use of all unnecessary and/or non-secure functions, ports, protocols, and/or services."
  cisco.asa.asa_config:
    lines:
      - "no http server enable"
      - "no telnet 10.1.22.2 255.255.255.255 INSIDE"
  notify: Save running configuration
  tags:
    - CASA-ND-000430
    - cat1
    - system_hardening

# -----------------------------------------
# CASA-ND-001180 - MEDIUM
# -----------------------------------------

- name: "CASA-ND-001180 | MANUAL CHECK - The Cisco ASA must be configured to protect against known types of denial-of-service (DoS) attacks by enabling the Threat Detection feature."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Review STIG fixtext and configure the ASA as required."
  tags:
    - CASA-ND-001180
    - cat2
    - system_hardening

# -----------------------------------------
# CASA-ND-001420 - HIGH
# -----------------------------------------

- name: "CASA-ND-001420 | MANUAL CHECK - The Cisco ASA must be running an operating system release that is currently supported by Cisco Systems."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Review STIG fixtext and configure the ASA as required."
  tags:
    - CASA-ND-001420
    - cat1
    - system_hardening

