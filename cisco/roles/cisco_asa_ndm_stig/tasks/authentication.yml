# -----------------------------------------
# CASA-ND-001080 - MEDIUM
# -----------------------------------------

- name: "CASA-ND-001080 | The Cisco ASA must be configured to authenticate Network Time Protocol (NTP) sources using authentication with FIPS-compliant algorithms."
  cisco.asa.asa_config:
    lines:
      - "ntp authenticate"
      - "ntp trusted-key 1"
      - "ntp authentication-key 1 sha256 {{ secret_key }}"
      - "ntp server 10.1.12.2 key 1 prefer"
      - "ntp server 10.1.48.10 key 1"
  notify: Save running configuration
  tags:
    - CASA-ND-001080
    - cat2
    - authentication

# -----------------------------------------
# CASA-ND-001310 - HIGH
# -----------------------------------------

- name: "CASA-ND-001310 | The Cisco ASA must be configured to use at least two authentication servers to authenticate users prior to granting administrative access."
  cisco.asa.asa_config:
    lines:
      - "key bobby"
      - "key bobby2"
      - "aaa authentication serial console RADIUS_GROUP LOCAL"
      - "aaa authentication ssh console RADIUS_GROUP LOCAL"
  notify: Save running configuration
  tags:
    - CASA-ND-001310
    - cat1
    - authentication

