---
# =========================================
# Cisco ASA NDM STIG - Authentication
# 10 rules
# =========================================

# -----------------------------------------
# CASA-ND-000450 - MEDIUM
# -----------------------------------------

- name: "CASA-ND-000450 | The Cisco ASA must be configured with only one local account to be used as the account of last resort in the event the authentication server is unavailable."
  cisco.asa.asa_config:
    lines:
      - "username LAST_RESORT privilege 15"
      - "username LAST_RESORT password {{ secret_key }}"
      - "key {{ secret_key }}"
      - "aaa authentication serial console RADIUS_GROUP LOCAL"
      - "aaa authentication ssh console RADIUS_GROUP LOCAL"
  notify: Save running configuration
  tags:
    - CASA-ND-000450
    - cat2
    - authentication

# -----------------------------------------
# CASA-ND-000490 - MEDIUM
# -----------------------------------------

- name: "CASA-ND-000490 | MANUAL CHECK - The Cisco ASA must be configured to enforce a minimum 15-character password length."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Review STIG fixtext and configure the ASA as required."
  tags:
    - CASA-ND-000490
    - cat2
    - authentication

