# -----------------------------------------
# CASA-ND-001350 - MEDIUM
# -----------------------------------------

- name: "CASA-ND-001350 | MANUAL CHECK - The Cisco ASA must be configured to conduct backups of system-level information contained in the information system when changes occur."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Review STIG fixtext and configure the ASA as required."
  tags:
    - CASA-ND-001350
    - cat2
    - logging

# -----------------------------------------
# CASA-ND-001410 - HIGH
# -----------------------------------------

- name: "CASA-ND-001410 | The Cisco ASA must be configured to send log data to at least two central log servers for the purpose of forwarding alerts to organization-defined personnel and/or the firewall administrator."
  cisco.asa.asa_config:
    lines:
      - "logging host NDM_INTERFACE 10.1.48.10 6/1514"
      - "logging host NDM_INTERFACE 10.1.48.11 6/1514"
      - "logging trap notifications"
  notify: Save running configuration
  tags:
    - CASA-ND-001410
    - cat1
    - logging

