---
# =========================================
# Cisco ASA NDM STIG - Logging
# 24 rules
# =========================================

# -----------------------------------------
# CASA-ND-000090 - MEDIUM
# -----------------------------------------

- name: "CASA-ND-000090 | The Cisco ASA must be configured to automatically audit account creation."
  cisco.asa.asa_config:
    lines:
      - "logging enable"
      - "logging buffered informational"
  notify: Save running configuration
  tags:
    - CASA-ND-000090
    - cat2
    - logging

