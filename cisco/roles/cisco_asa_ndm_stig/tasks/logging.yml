# -----------------------------------------
# CASA-ND-000920 - MEDIUM
# -----------------------------------------

- name: "CASA-ND-000920 | The Cisco ASA must be configured to allocate audit record storage capacity in accordance with organization-defined audit record storage requirements."
  cisco.asa.asa_config:
    lines:
      - "logging flash-maximum-allocation {{ numeric_value }}"
      - "logging flash-minimum-free {{ numeric_value }}"
  notify: Save running configuration
  tags:
    - CASA-ND-000920
    - cat2
    - logging

# -----------------------------------------
# CASA-ND-000930 - MEDIUM
# -----------------------------------------

- name: "CASA-ND-000930 | The Cisco ASA must be configured to generate an immediate real-time alert of all audit failure events requiring real-time alerts."
  cisco.asa.asa_config:
    lines:
      - "logging host NDM_INTERFACE 10.1.48.10"
      - "logging trap critical"
  notify: Save running configuration
  tags:
    - CASA-ND-000930
    - cat2
    - logging

# -----------------------------------------
# CASA-ND-000970 - MEDIUM
# -----------------------------------------

- name: "CASA-ND-000970 | The Cisco ASA must be configured to record time stamps for audit records that meet a granularity of one second for a minimum degree of precision."
  cisco.asa.asa_config:
    lines:
      - "logging timestamp"
  notify: Save running configuration
  tags:
    - CASA-ND-000970
    - cat2
    - logging

