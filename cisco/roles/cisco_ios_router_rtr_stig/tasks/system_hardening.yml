---
# =========================================
# Cisco IOS Router RTR STIG - System Hardening
# 1 rules
# =========================================

# -----------------------------------------
# CISC-RT-000090 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000090 | The Cisco router must not be configured to have any zero-touch deployment feature enabled when connected to an operational network."
  cisco.ios.ios_config:
    lines:
      - "no boot network"
      - "no service config"
      - "no cns config initial"
      - "no cns exec"
      - "no cns image"
  notify: Save running configuration
  tags:
    - CISC-RT-000090
    - cat2
    - system_hardening

