---
# =========================================
# Cisco ACI NDM STIG - Authorization
# 2 rules
# =========================================

# -----------------------------------------
# CACI-ND-000003 - MEDIUM
# -----------------------------------------

- name: "CACI-ND-000003 | MANUAL CHECK - The Cisco ACI must display the Standard Mandatory DOD Notice and Consent Banner before granting access to the device."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: The CLI banner is a simple text string to be printed at the terminal before the password prompt. A banner can be defined for the APIC CLI and a separate banner for the switch CLI. 1. In the GUI men..."
  tags:
    - CACI-ND-000003
    - cat2
    - authorization

# -----------------------------------------
# CACI-ND-000012 - HIGH
# -----------------------------------------

- name: "CACI-ND-000012 | The Cisco ACI must be configured to assign appropriate user roles or access levels to authenticated users."
  cisco.aci.aci_aaa_user:
    aaa_user: "{{ cisco_aci_ndm_stig_aaa_user | default('admin') }}"
    state: present
  notify: Commit ACI configuration
  tags:
    - CACI-ND-000012
    - cat1
    - authorization

