---
# =========================================
# Cisco ACI NDM DISA STIG V1 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 26 (CAT I: 7, CAT II: 19, CAT III: 0)
#
# Usage:
#   --tags authentication           (9 rules)
#   --tags authorization            (2 rules)
#   --tags encryption               (2 rules)
#   --tags logging                  (7 rules)
#   --tags network_services         (2 rules)
#   --tags session_management       (1 rules)
#   --tags system_hardening         (3 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags CACI-ND-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is Cisco ACI"
  ansible.builtin.assert:
    that:
      - ansible_network_os is defined
    fail_msg: >-
      This role targets Cisco ACI only.
    quiet: true
  tags:
    - always

- name: "CACI-ND | Authentication (9 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "CACI-ND | Authorization (2 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "CACI-ND | Encryption (2 rules)"
  ansible.builtin.import_tasks: encryption.yml
  tags:
    - encryption

- name: "CACI-ND | Logging (7 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "CACI-ND | Network Services (2 rules)"
  ansible.builtin.import_tasks: network_services.yml
  tags:
    - network_services

- name: "CACI-ND | Session Management (1 rules)"
  ansible.builtin.import_tasks: session_management.yml
  tags:
    - session_management

- name: "CACI-ND | System Hardening (3 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
