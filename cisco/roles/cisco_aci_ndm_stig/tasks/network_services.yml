---
# =========================================
# Cisco ACI NDM STIG - Network Services
# 2 rules
# =========================================

# -----------------------------------------
# CACI-ND-000021 - MEDIUM
# -----------------------------------------

- name: "CACI-ND-000021 | The Cisco ACI must implement replay-resistant authentication mechanisms for network access to privileged accounts."
  cisco.aci.aci_aaa_user:
    aaa_user: "{{ cisco_aci_ndm_stig_aaa_user | default('admin') }}"
    state: present
  notify: Commit ACI configuration
  tags:
    - CACI-ND-000021
    - cat2
    - network_services

# -----------------------------------------
# CACI-ND-000056 - MEDIUM
# -----------------------------------------

- name: "CACI-ND-000056 | MANUAL CHECK - The Cisco ACI must be configured to synchronize system clocks within and between systems or system components."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Create an NTP policy: 1. Navigate to Fabric >> Quickstart and click \"Create an NTP Policy Link\". 2. Complete the form. - Provide a name for the policy. - Set the State to \"Enabled\". 3. Click \"..."
  tags:
    - CACI-ND-000056
    - cat2
    - network_services

