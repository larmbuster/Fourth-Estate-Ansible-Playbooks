---
# =========================================
# Cisco ACI NDM STIG - Encryption
# 2 rules
# =========================================

# -----------------------------------------
# CACI-ND-000002 - MEDIUM
# -----------------------------------------

- name: "CACI-ND-000002 | The Cisco ACI must be configured to authenticate SNMP messages using a FIPS-validated Keyed-Hash Message Authentication Code (HMAC)."
  cisco.aci.aci_snmp_policy:
    name: "{{ cisco_aci_ndm_stig_snmp_policy | default('stig-snmp') }}"
    state: present
  notify: Commit ACI configuration
  tags:
    - CACI-ND-000002
    - cat2
    - encryption

# -----------------------------------------
# CACI-ND-000051 - HIGH
# -----------------------------------------

- name: "CACI-ND-000051 | The Cisco ACI must use FIPS 140-2/140-3 approved algorithms for authentication to a cryptographic module."
  cisco.aci.aci_rest:
    path: "{{ cisco_aci_ndm_stig_caci_nd_000051_api_path | default('/api/mo/uni.json') }}"
    method: post
    content: "{{ cisco_aci_ndm_stig_caci_nd_000051_content | default({}) }}"
  notify: Commit ACI configuration
  tags:
    - CACI-ND-000051
    - cat1
    - encryption

