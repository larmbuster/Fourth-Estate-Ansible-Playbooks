---
# =========================================
# Cisco ACI NDM STIG - Logging
# 7 rules
# =========================================

# -----------------------------------------
# CACI-ND-000001 - MEDIUM
# -----------------------------------------

- name: "CACI-ND-000001 | The Cisco ACI must record time stamps for audit records that can be mapped to Coordinated Universal Time (UTC)."
  cisco.aci.aci_rest:
    path: "{{ cisco_aci_ndm_stig_caci_nd_000001_api_path | default('/api/mo/uni.json') }}"
    method: post
    content: "{{ cisco_aci_ndm_stig_caci_nd_000001_content | default({}) }}"
  notify: Commit ACI configuration
  tags:
    - CACI-ND-000001
    - cat2
    - logging

# -----------------------------------------
# CACI-ND-000016 - HIGH
# -----------------------------------------

- name: "CACI-ND-000016 | The Cisco ACI must be configured to send log data to a central log server for log retention and forwarding alerts to the administrators and the information system security officer (ISSO)."
  cisco.aci.aci_rest:
    path: "{{ cisco_aci_ndm_stig_caci_nd_000016_api_path | default('/api/mo/uni.json') }}"
    method: post
    content: "{{ cisco_aci_ndm_stig_caci_nd_000016_content | default({}) }}"
  notify: Commit ACI configuration
  tags:
    - CACI-ND-000016
    - cat1
    - logging

# -----------------------------------------
# CACI-ND-000017 - MEDIUM
# -----------------------------------------

- name: "CACI-ND-000017 | The Cisco ACI must be configured to alert organization-defined personnel or roles upon detection of unauthorized access, modification, or deletion of audit information."
  cisco.aci.aci_rest:
    path: "{{ cisco_aci_ndm_stig_caci_nd_000017_api_path | default('/api/mo/uni.json') }}"
    method: post
    content: "{{ cisco_aci_ndm_stig_caci_nd_000017_content | default({}) }}"
  notify: Commit ACI configuration
  tags:
    - CACI-ND-000017
    - cat2
    - logging

# -----------------------------------------
# CACI-ND-000018 - MEDIUM
# -----------------------------------------

- name: "CACI-ND-000018 | MANUAL CHECK - The Cisco ACI must audit the enforcement actions used to restrict access associated with changes to the device."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Configure the ACI Fabric to send messages to redundant external syslog servers. Create Syslog Remote Location: 1. Navigate to Admin >> External Data Collectors >> Monitoring Destinations >> Syslog...."
  tags:
    - CACI-ND-000018
    - cat2
    - logging

# -----------------------------------------
# CACI-ND-000020 - MEDIUM
# -----------------------------------------

- name: "CACI-ND-000020 | MANUAL CHECK - The Cisco ACI must allocate audit record storage capacity in accordance with organization-defined audit record storage requirements."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Configuring the ACI Fabric to send messages to redundant external syslog servers. Create Syslog Remote Location: 1. Navigate to Admin >> External Data Collectors >> Monitoring Destinations >> Syslo..."
  tags:
    - CACI-ND-000020
    - cat2
    - logging

# -----------------------------------------
# CACI-ND-000024 - MEDIUM
# -----------------------------------------

- name: "CACI-ND-000024 | The Cisco ACI must automatically audit account creation."
  cisco.aci.aci_aaa_user:
    aaa_user: "{{ cisco_aci_ndm_stig_aaa_user | default('admin') }}"
    state: present
  notify: Commit ACI configuration
  tags:
    - CACI-ND-000024
    - cat2
    - logging

# -----------------------------------------
# CACI-ND-000029 - MEDIUM
# -----------------------------------------

- name: "CACI-ND-000029 | MANUAL CHECK - The Cisco ACI must generate log records for a locally developed list of auditable events."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Configure locally required events for auditing in compliance with the SSP: 1. Navigate to the \"Contracts\" section within the tenant. 2. View the existing contracts: Tenants >> {{your_tenant}} >> ..."
  tags:
    - CACI-ND-000029
    - cat2
    - logging

