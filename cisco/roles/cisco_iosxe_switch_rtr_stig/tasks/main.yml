---
# =========================================
# Cisco IOS-XE Switch RTR DISA STIG V3 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 88 (CAT I: 8, CAT II: 52, CAT III: 28)
#
# Usage:
#   --tags access_control           (44 rules)
#   --tags authentication           (3 rules)
#   --tags authorization            (1 rules)
#   --tags logging                  (3 rules)
#   --tags network_services         (11 rules)
#   --tags routing                  (18 rules)
#   --tags switching                (2 rules)
#   --tags system_hardening         (6 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags CISC-RT-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is Cisco IOS-XE Switch"
  ansible.builtin.assert:
    that:
      - ansible_network_os == "cisco.ios.ios"
    fail_msg: >-
      This role targets Cisco IOS-XE Switch only.
    quiet: true
  tags:
    - always

- name: "CISC-RT | Access Control (44 rules)"
  ansible.builtin.import_tasks: access_control.yml
  tags:
    - access_control

- name: "CISC-RT | Authentication (3 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "CISC-RT | Authorization (1 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "CISC-RT | Logging (3 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "CISC-RT | Network Services (11 rules)"
  ansible.builtin.import_tasks: network_services.yml
  tags:
    - network_services

- name: "CISC-RT | Routing (18 rules)"
  ansible.builtin.import_tasks: routing.yml
  tags:
    - routing

- name: "CISC-RT | Switching (2 rules)"
  ansible.builtin.import_tasks: switching.yml
  tags:
    - switching

- name: "CISC-RT | System Hardening (6 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
