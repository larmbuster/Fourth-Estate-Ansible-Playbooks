---
# =========================================
# Cisco IOS-XR Router RTR DISA STIG V3 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 96 (CAT I: 10, CAT II: 57, CAT III: 29)
#
# Usage:
#   --tags access_control           (46 rules)
#   --tags authentication           (2 rules)
#   --tags authorization            (1 rules)
#   --tags encryption               (3 rules)
#   --tags logging                  (1 rules)
#   --tags network_services         (10 rules)
#   --tags routing                  (30 rules)
#   --tags switching                (2 rules)
#   --tags system_hardening         (1 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags CISC-RT-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is Cisco IOS-XR Router"
  ansible.builtin.assert:
    that:
      - ansible_network_os == "cisco.iosxr.iosxr"
    fail_msg: >-
      This role targets Cisco IOS-XR Router only.
    quiet: true
  tags:
    - always

- name: "CISC-RT | Access Control (46 rules)"
  ansible.builtin.import_tasks: access_control.yml
  tags:
    - access_control

- name: "CISC-RT | Authentication (2 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "CISC-RT | Authorization (1 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "CISC-RT | Encryption (3 rules)"
  ansible.builtin.import_tasks: encryption.yml
  tags:
    - encryption

- name: "CISC-RT | Logging (1 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "CISC-RT | Network Services (10 rules)"
  ansible.builtin.import_tasks: network_services.yml
  tags:
    - network_services

- name: "CISC-RT | Routing (30 rules)"
  ansible.builtin.import_tasks: routing.yml
  tags:
    - routing

- name: "CISC-RT | Switching (2 rules)"
  ansible.builtin.import_tasks: switching.yml
  tags:
    - switching

- name: "CISC-RT | System Hardening (1 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
