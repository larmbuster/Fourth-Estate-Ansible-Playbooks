# =========================================
# Cisco IOS-XR Router RTR STIG - Access Control
# 46 rules
# =========================================

# -----------------------------------------
# CISC-RT-000010 - MEDIUM
# -----------------------------------------

- name: "CISC-RT-000010 | The Cisco router must be configured to enforce approved authorizations for controlling the flow of information within the network based on organization-defined information flow control policies."
  cisco.iosxr.iosxr_acls:
    config: "{{ cisco_iosxr_router_rtr_stig_acl_config | default([]) }}"
    state: merged
  notify: Save running configuration
  tags:
    - CISC-RT-000010
    - cat2
    - access_control

# -----------------------------------------
# CISC-RT-000060 - LOW
# -----------------------------------------

- name: "CISC-RT-000060 | The Cisco router must be configured to have all inactive interfaces disabled."
  cisco.iosxr.iosxr_config:
    lines:
      - "interface GigabitEthernet3"
      - "shutdown"
      - "interface GigabitEthernet4"
      - "shutdown"
  notify: Save running configuration
  tags:
    - CISC-RT-000060
    - cat3
    - access_control

