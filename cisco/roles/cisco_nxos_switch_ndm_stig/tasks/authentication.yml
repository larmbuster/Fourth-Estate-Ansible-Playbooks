# -----------------------------------------
# CISC-ND-001370 - HIGH
# -----------------------------------------

- name: "CISC-ND-001370 | The Cisco switch must be configured to use at least two authentication servers for the purpose of authenticating users prior to granting administrative access."
  cisco.nxos.nxos_config:
    lines:
      - "radius-server host 10.1.48.10 key {{ secret_key }}"
      - "radius-server host 10.1.48.11 key {{ secret_key }}"
      - "aaa group server radius RADIUS_SERVERS"
      - "aaa authentication login default group RADIUS_SERVERS"
      - "aaa authentication login console group RADIUS_SERVERS"
  notify: Save running configuration
  tags:
    - CISC-ND-001370
    - cat1
    - authentication

