---
# =========================================
# Cisco NX-OS Switch NDM STIG - Authentication
# 16 rules
# =========================================

# -----------------------------------------
# CISC-ND-000150 - MEDIUM
# -----------------------------------------

- name: "CISC-ND-000150 | The Cisco switch must be configured to enforce the limit of three consecutive invalid logon attempts, after which time it must disconnect the session."
  cisco.nxos.nxos_config:
    lines:
      - "ssh login-attempts 3"
  notify: Save running configuration
  tags:
    - CISC-ND-000150
    - cat2
    - authentication

# -----------------------------------------
# CISC-ND-000210 - MEDIUM
# -----------------------------------------

- name: "CISC-ND-000210 | The Cisco switch must be configured to protect against an individual falsely denying having performed organization-defined actions to be covered by non-repudiation."
  cisco.nxos.nxos_config:
    lines:
      - "radius-server host 10.1.48.10"
      - "radius-server host 10.1.48.12"
      - "aaa group server radius RADIUS_SERVERS"
      - "aaa accounting default group RADIUS_SERVERS"
  notify: Save running configuration
  tags:
    - CISC-ND-000210
    - cat2
    - authentication

# -----------------------------------------
# CISC-ND-000330 - MEDIUM
# -----------------------------------------

- name: "CISC-ND-000330 | The Cisco switch must be configured to generate audit records containing the full-text recording of privileged commands."
  cisco.nxos.nxos_config:
    lines:
      - "radius-server host 10.1.48.10"
      - "radius-server host 10.1.48.12"
      - "aaa group server radius RADIUS_SERVERS"
      - "aaa accounting default group RADIUS_SERVERS"
  notify: Save running configuration
  tags:
    - CISC-ND-000330
    - cat2
    - authentication

# -----------------------------------------
# CISC-ND-000490 - MEDIUM
# -----------------------------------------

- name: "CISC-ND-000490 | The Cisco switch must be configured with only one local account to be used as the account of last resort in the event the authentication server is unavailable."
  cisco.nxos.nxos_config:
    lines:
      - "username {{ secret_key }} password {{ secret_key }} role priv-9"
      - "aaa authentication login default group RADIUS_SERVERS"
      - "aaa authentication login default fallback error local"
  notify: Save running configuration
  tags:
    - CISC-ND-000490
    - cat2
    - authentication

