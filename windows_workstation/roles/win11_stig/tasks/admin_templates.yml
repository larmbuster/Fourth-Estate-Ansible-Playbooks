# -----------------------------------------
# WN11-CC-000050 - MEDIUM
# -----------------------------------------

- name: "WN11-CC-000050 | Hardened UNC Paths must require mutual authentication and integrity (NETLOGON)"
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\NetworkProvider\HardenedPaths
    name: "\\\\*\\NETLOGON"
    data: "RequireMutualAuthentication=1, RequireIntegrity=1"
    type: string
  tags:
    - WN11-CC-000050
    - cat2
    - admin_templates

- name: "WN11-CC-000050 | Hardened UNC Paths must require mutual authentication and integrity (SYSVOL)"
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\NetworkProvider\HardenedPaths
    name: "\\\\*\\SYSVOL"
    data: "RequireMutualAuthentication=1, RequireIntegrity=1"
    type: string
  tags:
    - WN11-CC-000050
    - cat2
    - admin_templates

# -----------------------------------------
# WN11-CC-000052 - MEDIUM
# -----------------------------------------

- name: "WN11-CC-000052 | Windows 11 must be configured to prioritize ECC Curves with longer key lengths first."
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Cryptography\Configuration\SSL\00010002
    name: EccCurves
    data:
      - NistP384
      - NistP256
    type: multistring
  tags:
    - WN11-CC-000052
    - cat2
    - admin_templates

