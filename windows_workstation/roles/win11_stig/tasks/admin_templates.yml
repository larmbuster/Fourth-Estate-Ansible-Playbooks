---
# =========================================
# Windows 11 DISA STIG V2R6 - Administrative Templates
# WN11-CC-* rules (+ WN11-EP-*, WN11-UC-*)
# Enforced via ansible.windows.win_regedit
# =========================================

# -----------------------------------------
# WN11-CC-000005 - MEDIUM
# -----------------------------------------

- name: "WN11-CC-000005 | Camera access from the lock screen must be disabled."
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization
    name: NoLockScreenCamera
    data: 1
    type: dword
  tags:
    - WN11-CC-000005
    - cat2
    - admin_templates

# -----------------------------------------
# WN11-CC-000007 - MEDIUM
# -----------------------------------------

- name: "WN11-CC-000007 | MANUAL CHECK - Windows 11 must cover or disable the built-in or attached camera when not in use."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Verify the built-in or attached camera is covered or disabled when not in use."
  tags:
    - WN11-CC-000007
    - cat2
    - admin_templates

# -----------------------------------------
# WN11-CC-000010 - MEDIUM
# -----------------------------------------

- name: "WN11-CC-000010 | The display of slide shows on the lock screen must be disabled."
  ansible.windows.win_regedit:
