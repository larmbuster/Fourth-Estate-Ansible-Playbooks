---
# =========================================
# Windows 11 DISA STIG V2R6 - User Rights Assignment
# WN11-UR-* rules
# Enforced via ansible.windows.win_user_right
# =========================================

# -----------------------------------------
# WN11-UR-000005 - MEDIUM
# -----------------------------------------

- name: "WN11-UR-000005 | The \"Access Credential Manager as a trusted caller\" user right must not be assigned to any groups or accounts."
  ansible.windows.win_user_right:
    name: SeTrustedCredManAccessPrivilege
    users: []
    action: set
  notify: Reboot required
  tags:
    - WN11-UR-000005
    - cat2
    - user_rights

# -----------------------------------------
# WN11-UR-000010 - MEDIUM
# -----------------------------------------

- name: "WN11-UR-000010 | The \"Access this computer from the network\" user right must only be assigned to the Administrators and Remote Desktop Users groups."
  ansible.windows.win_user_right:
    name: SeNetworkLogonRight
    users: "{{ win11_stig_network_access_groups }}"
    action: set
  notify: Reboot required
  tags:
    - WN11-UR-000010
    - cat2
    - user_rights

