    - cat2
    - general_checks

# -----------------------------------------
# WN11-00-000030 - HIGH
# -----------------------------------------

- name: "WN11-00-000030 | Windows 11 information systems must use BitLocker to encrypt all disks to protect the confidentiality and integrity of all information at rest."
  ansible.windows.win_powershell:
    script: |
      $Ansible.Changed = $false
      Get-BitLockerVolume | Select-Object MountPoint, VolumeStatus, EncryptionPercentage, ProtectionStatus
  register: wn11_00_000030_result
  check_mode: false
  failed_when: false
  tags:
    - WN11-00-000030
    - cat1
    - general_checks

- name: "WN11-00-000030 | Display result"
  ansible.builtin.debug:
    var: wn11_00_000030_result.output
  tags:
    - WN11-00-000030
    - cat1
    - general_checks

# -----------------------------------------
# WN11-00-000031 - HIGH
# -----------------------------------------

- name: "WN11-00-000031 | Windows 11 systems must use a BitLocker PIN for pre-boot authentication. (UseAdvancedStartup)"
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\FVE
    name: UseAdvancedStartup
    data: 1
    type: dword
  tags:
    - WN11-00-000031
    - cat1
    - general_checks

- name: "WN11-00-000031 | Windows 11 systems must use a BitLocker PIN for pre-boot authentication. (UseTPMPIN)"
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\FVE
    name: UseTPMPIN
    data: 1
    type: dword
  tags:
    - WN11-00-000031
    - cat1
    - general_checks

- name: "WN11-00-000031 | Windows 11 systems must use a BitLocker PIN for pre-boot authentication. (UseTPMKeyPIN)"
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\FVE
    name: UseTPMKeyPIN
    data: 1
    type: dword
  tags:
    - WN11-00-000031
    - cat1
    - general_checks

# -----------------------------------------
# WN11-00-000032 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000032 | Windows 11 systems must use a BitLocker PIN with a minimum length of six digits for pre-boot authentication."
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\FVE
    name: MinimumPIN
    data: "{{ win11_stig_bitlocker_min_pin }}"
    type: dword
  tags:
    - WN11-00-000032
    - cat2
    - general_checks

# -----------------------------------------
# WN11-00-000035 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000035 | MANUAL CHECK - The operating system must employ a deny-all, permit-by-exception policy to allow the execution of authorized software programs."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Verify application whitelisting (e.g., AppLocker or WDAC) is configured with a deny-all, permit-by-exception policy."
  tags:
    - WN11-00-000035
    - cat2
    - general_checks

# -----------------------------------------
# WN11-00-000040 - HIGH
# -----------------------------------------

- name: "WN11-00-000040 | Windows 11 systems must be maintained at a supported servicing level."
  ansible.windows.win_powershell:
    script: |
      $Ansible.Changed = $false
      $ver = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion'
      "$($ver.DisplayVersion) (OS Build $($ver.CurrentBuildNumber).$($ver.UBR))"
  register: wn11_00_000040_result
  check_mode: false
  failed_when: false
  tags:
    - WN11-00-000040
    - cat1
    - general_checks

- name: "WN11-00-000040 | Display result"
  ansible.builtin.debug:
    msg: "OS Version: {{ wn11_00_000040_result.output | default(['UNKNOWN']) | first }} (STIG minimum build: {{ win11_stig_min_os_build }})"
  tags:
    - WN11-00-000040
    - cat1
    - general_checks

