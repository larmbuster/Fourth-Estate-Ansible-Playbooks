# WN11-00-000125 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000125 | Copilot must be disabled for Windows 11."
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsCopilot
    name: TurnOffWindowsCopilot
    data: 1
    type: dword
  tags:
    - WN11-00-000125
    - cat2
    - general_checks

# -----------------------------------------
# WN11-00-000126 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000126 | Windows 11 systems must block consumer account user authentication."
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\MicrosoftAccount
    name: DisableUserAuth
    data: 1
    type: dword
  tags:
    - WN11-00-000126
    - cat2
    - general_checks

# -----------------------------------------
# WN11-00-000130 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000130 | Software certificate installation files must be removed from Windows 11."
  ansible.windows.win_find:
    paths: 'C:\'
    patterns:
      - '*.p12'
      - '*.pfx'
      - '*.p7b'
      - '*.cer'
    recurse: true
    get_checksum: false
  register: wn11_00_000130_result
  tags:
    - WN11-00-000130
    - cat2
    - general_checks

- name: "WN11-00-000130 | Display result"
  ansible.builtin.debug:
    msg: "Found {{ wn11_00_000130_result.matched }} certificate files: {{ wn11_00_000130_result.files | map(attribute='path') | list }}"
  tags:
    - WN11-00-000130
    - cat2
    - general_checks

# -----------------------------------------
# WN11-00-000135 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000135 | A host-based firewall must be installed and enabled on the system."
  ansible.windows.win_firewall:
    state: enabled
    profiles:
      - Domain
      - Private
      - Public
  tags:
    - WN11-00-000135
    - cat2
    - general_checks

