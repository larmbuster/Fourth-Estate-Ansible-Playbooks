---
# =========================================
# Windows 11 DISA STIG V2R6 - General OS Checks
# WN11-00-* rules (+ WN11-RG-*)
# Verification/reporting and automatable remediations
# =========================================

# -----------------------------------------
# WN11-00-000005 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000005 | Domain-joined systems must use Windows 11 Enterprise Edition 64-bit version."
  ansible.windows.win_powershell:
    script: |
      $Ansible.Changed = $false
      (Get-WindowsEdition -Online).Edition
  register: wn11_00_000005_result
  check_mode: false
  failed_when: false
  tags:
    - WN11-00-000005
    - cat2
    - general_checks

- name: "WN11-00-000005 | Display result"
  ansible.builtin.debug:
    msg: "Windows Edition: {{ wn11_00_000005_result.output | default(['UNKNOWN']) | first }}"
  tags:
    - WN11-00-000005
    - cat2
    - general_checks

# -----------------------------------------
# WN11-00-000010 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000010 | Windows 11 domain-joined systems must have a Trusted Platform Module (TPM) enabled."
  ansible.windows.win_powershell:
    script: |
      $Ansible.Changed = $false
      Get-Tpm | Select-Object TpmPresent, TpmReady, TpmEnabled
  register: wn11_00_000010_result
  check_mode: false
  failed_when: false
  tags:
    - WN11-00-000010
    - cat2
    - general_checks

- name: "WN11-00-000010 | Display result"
  ansible.builtin.debug:
    var: wn11_00_000010_result.output
  tags:
    - WN11-00-000010
    - cat2
    - general_checks

# -----------------------------------------
# WN11-00-000015 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000015 | Windows 11 systems must have Unified Extensible Firmware Interface (UEFI) firmware and be configured to run in UEFI mode, not Legacy BIOS."
  ansible.windows.win_reg_stat:
    path: HKLM:\SYSTEM\CurrentControlSet\Control
    name: PEFirmwareType
  register: wn11_00_000015_result
  tags:
    - WN11-00-000015
    - cat2
    - general_checks

- name: "WN11-00-000015 | Display result (value 2 = UEFI)"
  ansible.builtin.debug:
    msg: "PEFirmwareType = {{ wn11_00_000015_result.value | default('NOT FOUND') }} (expected: 2 for UEFI)"
  tags:
    - WN11-00-000015
    - cat2
    - general_checks

# -----------------------------------------
# WN11-00-000020 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000020 | Secure Boot must be enabled on Windows 11 systems."
  ansible.windows.win_powershell:
    script: |
      $Ansible.Changed = $false
      Confirm-SecureBootUEFI
  register: wn11_00_000020_result
  check_mode: false
  failed_when: false
  tags:
    - WN11-00-000020
    - cat2
    - general_checks

- name: "WN11-00-000020 | Display result"
  ansible.builtin.debug:
    msg: "Secure Boot enabled: {{ wn11_00_000020_result.output | default(['UNKNOWN']) | first }}"
  tags:
    - WN11-00-000020
    - cat2
    - general_checks

# -----------------------------------------
# WN11-00-000025 - MEDIUM
# -----------------------------------------

- name: "WN11-00-000025 | MANUAL CHECK - Verify DOD-approved ESS software is installed and operational."
