# -----------------------------------------
# WN11-AU-000500 - MEDIUM
# -----------------------------------------

- name: "WN11-AU-000500 | The Application event log size must be configured to 32768 KB or greater."
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\EventLog\Application
    name: MaxSize
    data: 32768
    type: dword
  notify: Reboot required
  tags:
    - WN11-AU-000500
    - cat2
    - audit_policy

# -----------------------------------------
# WN11-AU-000505 - MEDIUM
