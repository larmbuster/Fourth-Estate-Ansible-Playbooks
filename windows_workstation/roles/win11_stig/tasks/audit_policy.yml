---
# =========================================
# Windows 11 DISA STIG V2R6 - Audit Policy
# WN11-AU-* rules
# Audit subcategories enforced via
# ansible.windows.win_audit_policy_system
# Event log sizes enforced via
# ansible.windows.win_regedit
# =========================================

# -----------------------------------------
# WN11-AU-000005 / WN11-AU-000010 - MEDIUM
# Credential Validation - success and failure
# -----------------------------------------

- name: "WN11-AU-000005/000010 | The system must be configured to audit Account Logon - Credential Validation successes and failures."
  ansible.windows.win_audit_policy_system:
    subcategory: Credential Validation
    audit_type: success,failure
  tags:
    - WN11-AU-000005
    - WN11-AU-000010
    - cat2
    - audit_policy

