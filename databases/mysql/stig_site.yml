---
# =========================================
# Oracle MySQL 8.0 DISA STIG Hardening Playbook
#
# Usage:
#   ansible-galaxy collection install -r requirements.yml
#   ansible-playbook -i inventory stig_site.yml
#   ansible-playbook -i inventory stig_site.yml --tags cat1
# =========================================

- name: Oracle MySQL 8.0 STIG Hardening
  hosts: mysql_servers
  gather_facts: true
  roles:
    - role: oracle_mysql80_stig

# =========================================
# Summary Play
# =========================================
- name: MySQL STIG Hardening Summary
  hosts: mysql_servers
  gather_facts: false
  tags:
    - always

  tasks:
    - name: Display hardening summary
      ansible.builtin.debug:
        msg:
          - "================================================"
          - "Oracle MySQL 8.0 DISA STIG hardening complete"
          - "Target: {{ inventory_hostname }}"
          - "================================================"
          - "Review any verification tasks that reported findings."
          - "Manual checks require administrator review."
          - "================================================"
