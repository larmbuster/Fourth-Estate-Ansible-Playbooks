---
# =========================================
# Oracle MySQL 8.0 Database DISA STIG V2 - Default Variables
# Override these in group_vars, host_vars,
# or via -e on the command line.
# All values are pre-set to STIG-compliant defaults.
# =========================================

# -----------------------------------------
# Behavior Flags
# -----------------------------------------
oracle_mysql80_stig_auto_restart: false

# -----------------------------------------
# Database Connection
# -----------------------------------------
oracle_mysql80_stig_db_user: "root"
oracle_mysql80_stig_db_password: "changeme"
oracle_mysql80_stig_config_path: "/etc/my.cnf"

# -----------------------------------------
# Security Settings
# -----------------------------------------
oracle_mysql80_stig_max_connect_errors: 3
oracle_mysql80_stig_default_password_lifetime: 90

# -----------------------------------------
# STIG-Specific Parameters (override per environment)
# -----------------------------------------
oracle_mysql80_stig_audit_log_policy: "ALL"
oracle_mysql80_stig_datadir: "/var/lib/mysql/"
oracle_mysql80_stig_revoke_user: "TODO_username"
oracle_mysql80_stig_revoke_host: "localhost"

