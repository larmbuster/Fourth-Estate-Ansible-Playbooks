---
# =========================================
# Oracle MySQL 8.0 Database DISA STIG V2 - Task Orchestrator
# Imports all category task files with tags
# for selective execution (import_tasks enables
# individual STIG ID tag filtering).
#
# Total rules: 100 (CAT I: 12, CAT II: 88, CAT III: 0)
#
# Usage:
#   --tags authentication           (14 rules)
#   --tags authorization            (32 rules)
#   --tags encryption               (8 rules)
#   --tags logging                  (31 rules)
#   --tags session_management       (1 rules)
#   --tags system_hardening         (14 rules)
#   --tags cat1                All CAT I (high) findings
#   --tags cat2                All CAT II (medium) findings
#   --tags cat3                All CAT III (low) findings
#   --tags MYS8-00-NNNNNN   Single specific finding
# =========================================

- name: "Pre-flight | Verify target is Oracle MySQL 8.0"
  ansible.builtin.assert:
    that:
      - ansible_os_family is defined
    fail_msg: >-
      This role targets Oracle MySQL 8.0 only.
    quiet: true
  tags:
    - always

- name: "MYS8-00 | Authentication (14 rules)"
  ansible.builtin.import_tasks: authentication.yml
  tags:
    - authentication

- name: "MYS8-00 | Authorization (32 rules)"
  ansible.builtin.import_tasks: authorization.yml
  tags:
    - authorization

- name: "MYS8-00 | Encryption (8 rules)"
  ansible.builtin.import_tasks: encryption.yml
  tags:
    - encryption

- name: "MYS8-00 | Logging (31 rules)"
  ansible.builtin.import_tasks: logging.yml
  tags:
    - logging

- name: "MYS8-00 | Session Management (1 rules)"
  ansible.builtin.import_tasks: session_management.yml
  tags:
    - session_management

- name: "MYS8-00 | System Hardening (14 rules)"
  ansible.builtin.import_tasks: system_hardening.yml
  tags:
    - system_hardening
