# =========================================
# Oracle MySQL 8.0 Database STIG - Authentication
# 14 rules
# =========================================

# -----------------------------------------
# MYS8-00-000100 - HIGH
# -----------------------------------------

- name: "MYS8-00-000100 | MANUAL CHECK - MySQL Database Server 8.0 must integrate with an organization-level authentication/access mechanism providing account management and automation for all users, groups, roles, and any other principals."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Integrate MySQL database server 8.0 security with an organization-level authentication/access mechanism using MySQL external authentication for Microsoft AD or LDAP, or Linux PAMs thus providing ac..."
  tags:
    - MYS8-00-000100
    - cat1
    - authentication

# -----------------------------------------
# MYS8-00-004700 - MEDIUM
# -----------------------------------------

- name: "MYS8-00-004700 | The MySQL Database Server 8.0, when utilizing PKI-based authentication, must validate certificates by performing RFC 5280-compliant certification path validation."
  community.mysql.mysql_query:
    login_user: "{{ oracle_mysql80_stig_db_user }}"
    login_password: "{{ oracle_mysql80_stig_db_password }}"
    query: "set persist require_secure_transport=ON;"
  notify: Restart MySQL service
  tags:
    - MYS8-00-004700
    - cat2
    - authentication

# -----------------------------------------
# MYS8-00-004800 - HIGH
# -----------------------------------------

- name: "MYS8-00-004800 | The MySQL Database Server 8.0 must enforce authorized access to all PKI private keys stored/utilized by the MySQL Database Server 8.0."
  community.mysql.mysql_query:
    login_user: "{{ oracle_mysql80_stig_db_user }}"
    login_password: "{{ oracle_mysql80_stig_db_password }}"
    query: "select @@ssl_capath, @@ssl_crlpath, @@ssl_key, @@datadir;"
  notify: Restart MySQL service
  tags:
    - MYS8-00-004800
    - cat1
    - authentication

# -----------------------------------------
# MYS8-00-004900 - MEDIUM
# -----------------------------------------

- name: "MYS8-00-004900 | The MySQL Database Server 8.0 must map the PKI-authenticated identity to an associated user account."
  community.mysql.mysql_user:
    login_user: "{{ oracle_mysql80_stig_db_user }}"
    login_password: "{{ oracle_mysql80_stig_db_password }}"
    name: "{{ oracle_mysql80_stig_mys8_00_004900_username }}"
    state: present
  notify: Restart MySQL service
  tags:
    - MYS8-00-004900
    - cat2
    - authentication

# -----------------------------------------
# MYS8-00-005000 - HIGH
# -----------------------------------------

- name: "MYS8-00-005000 | If Database Management System (DBMS) authentication using passwords is employed, the DBMS must enforce the DOD standards for password complexity and lifetime."
  community.mysql.mysql_query:
    login_user: "{{ oracle_mysql80_stig_db_user }}"
    login_password: "{{ oracle_mysql80_stig_db_password }}"
    query: "set persist validate_password.check_user_name='ON';"
  notify: Restart MySQL service
  tags:
    - MYS8-00-005000
    - cat1
    - authentication

# -----------------------------------------
# MYS8-00-005100 - MEDIUM
