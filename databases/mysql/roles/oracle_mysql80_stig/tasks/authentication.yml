- name: "MYS8-00-005100 | MANUAL CHECK - If passwords are used for authentication, the MySQL Database Server 8.0 must store only hashed, salted representations of passwords."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Develop, document, and maintain a list of DBMS database objects, database configuration files, associated scripts, and applications defined within or external to the DBMS that access the database, ..."
  tags:
    - MYS8-00-005100
