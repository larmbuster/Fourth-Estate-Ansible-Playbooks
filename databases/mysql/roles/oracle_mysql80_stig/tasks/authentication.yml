    - authentication

# -----------------------------------------
# MYS8-00-005200 - HIGH
# -----------------------------------------

- name: "MYS8-00-005200 | If passwords are used for authentication, the MySQL Database Server 8.0 must transmit only encrypted representations of passwords."
  community.mysql.mysql_query:
