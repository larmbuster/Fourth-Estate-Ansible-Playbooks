---
# =========================================
# MS SQL Server DISA STIG Hardening Playbook
#
# Usage:
#   ansible-galaxy collection install -r requirements.yml
#   ansible-playbook -i inventory stig_site.yml
#   ansible-playbook -i inventory stig_site.yml --tags cat1
# =========================================

# --- MS SQL Server 2022 ---
- name: MS SQL Server 2022 Instance STIG Hardening
  hosts: mssql_2022_servers
  gather_facts: true
  roles:
    - role: mssql_2022_instance_stig

- name: MS SQL Server 2022 Database STIG Hardening
  hosts: mssql_2022_servers
  gather_facts: true
  roles:
    - role: mssql_2022_database_stig

# --- MS SQL Server 2016 ---
- name: MS SQL Server 2016 Instance STIG Hardening
  hosts: mssql_2016_servers
  gather_facts: true
  roles:
    - role: mssql_2016_instance_stig

- name: MS SQL Server 2016 Database STIG Hardening
  hosts: mssql_2016_servers
  gather_facts: true
  roles:
    - role: mssql_2016_database_stig

# =========================================
# Summary Play
# =========================================
- name: MS SQL STIG Hardening Summary
  hosts: all
  gather_facts: false
  tags:
    - always

  tasks:
    - name: Display hardening summary
      ansible.builtin.debug:
        msg:
          - "================================================"
          - "MS SQL Server DISA STIG hardening complete"
          - "Target: {{ inventory_hostname }}"
          - "================================================"
          - "Review any verification tasks that reported findings."
          - "Manual checks require administrator review."
          - "================================================"
