# =========================================
# MS SQL Server 2022 Instance DISA STIG V1 - Default Variables
# Override these in group_vars, host_vars,
# or via -e on the command line.
# All values are pre-set to STIG-compliant defaults.
# =========================================

# -----------------------------------------
# Behavior Flags
# -----------------------------------------
mssql_2022_instance_stig_auto_restart: false

# -----------------------------------------
# Database Connection
# -----------------------------------------
mssql_2022_instance_stig_db_user: "sa"
mssql_2022_instance_stig_db_password: "changeme"
mssql_2022_instance_stig_db_host: "localhost"
mssql_2022_instance_stig_instance_name: "MSSQLSERVER"

# -----------------------------------------
# Audit Configuration
# -----------------------------------------
mssql_2022_instance_stig_audit_name: "STIG_Audit"
mssql_2022_instance_stig_audit_filepath: "C:\\SQLAudit\\"

# -----------------------------------------
# STIG-Specific Parameters (override per environment)
# -----------------------------------------
mssql_2022_instance_stig_server_role: "TODO_server_role"
mssql_2022_instance_stig_login_name: "TODO_login_name"

