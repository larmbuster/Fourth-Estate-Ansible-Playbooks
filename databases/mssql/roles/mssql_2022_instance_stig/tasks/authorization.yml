# =========================================
# MS SQL Server 2022 Instance STIG - Authorization
# 21 rules
# =========================================

# -----------------------------------------
# SQLI-22-003900 - HIGH
# -----------------------------------------

- name: "SQLI-22-003900 | MANUAL CHECK - SQL Server must enforce approved authorizations for logical access to information and system resources in accordance with applicable access control policies."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Use GRANT, REVOKE, DENY, ALTER SERVER ROLE … ADD MEMBER … and/or ALTER SERVER ROLE …. DROP MEMBER statements to add and remove permissions on server-level securables, bringing them into line with t..."
  tags:
    - SQLI-22-003900
    - cat1
    - authorization

# -----------------------------------------
# SQLI-22-004100 - MEDIUM
# -----------------------------------------

- name: "SQLI-22-004100 | SQL Server must protect against a user falsely repudiating by ensuring the NT AUTHORITY SYSTEM account is not used for administration."
  community.general.mssql_script:
    login_user: "{{ mssql_2022_instance_stig_db_user }}"
    login_password: "{{ mssql_2022_instance_stig_db_password }}"
    login_host: "{{ mssql_2022_instance_stig_db_host }}"
    script: |
      USE Master;
  notify: Restart SQL Server service
  tags:
    - SQLI-22-004100
    - cat2
    - authorization

# -----------------------------------------
# SQLI-22-004400 - MEDIUM
# -----------------------------------------

- name: "SQLI-22-004400 | SQL Server must allow only the information system security manager (ISSM) (or individuals or roles appointed by the ISSM) to select which auditable events are to be audited."
  community.general.mssql_script:
    login_user: "{{ mssql_2022_instance_stig_db_user }}"
    login_password: "{{ mssql_2022_instance_stig_db_password }}"
    login_host: "{{ mssql_2022_instance_stig_db_host }}"
    script: |
      CREATE SERVER ROLE SERVER_AUDIT_MAINTAINERS;
  notify: Restart SQL Server service
  tags:
    - SQLI-22-004400
    - cat2
    - authorization

