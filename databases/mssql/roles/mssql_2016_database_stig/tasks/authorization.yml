# -----------------------------------------
# SQL6-D0-002800 - LOW
# -----------------------------------------

- name: "SQL6-D0-002800 | SQL Server must enforce discretionary access control policies, as defined by the data owner, over defined subjects and objects."
  community.general.mssql_script:
    login_user: "{{ mssql_2016_database_stig_db_user }}"
    login_password: "{{ mssql_2016_database_stig_db_password }}"
    login_host: "{{ mssql_2016_database_stig_db_host }}"
    script: |
      ALTER AUTHORIZATION ON {{ securable }} TO {{ principal }}
  notify: Restart SQL Server service
  tags:
