# -----------------------------------------
# SQL6-D0-002400 - MEDIUM
# -----------------------------------------

- name: "SQL6-D0-002400 | MANUAL CHECK - SQL Server must provide non-privileged users with error messages that provide information necessary for corrective actions without revealing information that could be exploited by adversaries."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Adjust database code to remove any information not required for explaining the error to an end user. Consider enabling trace flag 3625 to mask certain system-level error information returned to non..."
  tags:
    - SQL6-D0-002400
    - cat2
