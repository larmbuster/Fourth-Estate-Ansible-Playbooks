---
# =========================================
# MS SQL Server 2016 Database STIG - Authentication
# 5 rules
# =========================================

# -----------------------------------------
# SQL6-D0-000100 - HIGH
# -----------------------------------------

- name: "SQL6-D0-000100 | MANUAL CHECK - SQL Server databases must integrate with an organization-level authentication/access mechanism providing account management and automation for all users, groups, roles, and any other principals."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: If mixed mode is required, document the need and justification; describe the measures taken to ensure the use of SQL Server authentication is kept to a minimum; describe the measures taken to safeg..."
  tags:
    - SQL6-D0-000100
    - cat1
    - authentication

# -----------------------------------------
# SQL6-D0-000400 - MEDIUM
# -----------------------------------------

- name: "SQL6-D0-000400 | SQL Server must protect against a user falsely repudiating by ensuring only clearly unique Active Directory user accounts can connect to the database."
  community.general.mssql_script:
    login_user: "{{ mssql_2016_database_stig_db_user }}"
    login_password: "{{ mssql_2016_database_stig_db_password }}"
    login_host: "{{ mssql_2016_database_stig_db_host }}"
    script: |
      SELECT name
  notify: Restart SQL Server service
  tags:
    - SQL6-D0-000400
    - cat2
    - authentication

# -----------------------------------------
# SQL6-D0-001600 - MEDIUM
# -----------------------------------------

- name: "SQL6-D0-001600 | The Database Master Key encryption password must meet DOD password complexity requirements."
  community.general.mssql_script:
    login_user: "{{ mssql_2016_database_stig_db_user }}"
    login_password: "{{ mssql_2016_database_stig_db_password }}"
    login_host: "{{ mssql_2016_database_stig_db_host }}"
    script: |
      USE [database name];
  notify: Restart SQL Server service
  tags:
    - SQL6-D0-001600
    - cat2
    - authentication

# -----------------------------------------
# SQL6-D0-001800 - MEDIUM
# -----------------------------------------

- name: "SQL6-D0-001800 | The Certificate used for encryption must be backed up and stored in a secure location that is not on the SQL Server."
  community.general.mssql_script:
    login_user: "{{ mssql_2016_database_stig_db_user }}"
    login_password: "{{ mssql_2016_database_stig_db_password }}"
    login_host: "{{ mssql_2016_database_stig_db_host }}"
    script: |
      SELECT 1 -- TODO: Review STIG fixtext and implement appropriate SQL
  notify: Restart SQL Server service
  tags:
    - SQL6-D0-001800
    - cat2
    - authentication

# -----------------------------------------
# SQL6-D0-003200 - HIGH
# -----------------------------------------

- name: "SQL6-D0-003200 | SQL Server must use NSA-approved cryptography to protect classified information in accordance with the data owners requirements."
  community.general.mssql_script:
    login_user: "{{ mssql_2016_database_stig_db_user }}"
    login_password: "{{ mssql_2016_database_stig_db_password }}"
    login_host: "{{ mssql_2016_database_stig_db_host }}"
    script: |
      USE master;
  notify: Restart SQL Server service
  tags:
    - SQL6-D0-003200
    - cat1
    - authentication

