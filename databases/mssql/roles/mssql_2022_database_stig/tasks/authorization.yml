---
# =========================================
# MS SQL Server 2022 Database STIG - Authorization
# 8 rules
# =========================================

# -----------------------------------------
# SQLD-22-000300 - HIGH
# -----------------------------------------

- name: "SQLD-22-000300 | MANUAL CHECK - SQL Server must enforce approved authorizations for logical access to information and system resources in accordance with applicable access control policies."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Configure SQL Server settings and access controls to permit user access only to objects and data that the user is authorized to view or interact with, and to prevent access to all other objects and..."
  tags:
    - SQLD-22-000300
    - cat1
    - authorization

# -----------------------------------------
# SQLD-22-000700 - MEDIUM
# -----------------------------------------

- name: "SQLD-22-000700 | SQL Server must allow only the information system security manager (ISSM) (or individuals or roles appointed by the ISSM) to select which auditable events are to be audited."
  community.general.mssql_script:
    login_user: "{{ mssql_2022_database_stig_db_user }}"
    login_password: "{{ mssql_2022_database_stig_db_password }}"
    login_host: "{{ mssql_2022_database_stig_db_host }}"
    script: |
      CREATE ROLE DATABASE_AUDIT_MAINTAINERS;
  notify: Restart SQL Server service
  tags:
    - SQLD-22-000700
    - cat2
    - authorization

# -----------------------------------------
# SQLD-22-001200 - MEDIUM
# -----------------------------------------

- name: "SQLD-22-001200 | SQL Server must limit privileges to change software modules, to include stored procedures, functions, and triggers, and links to software external to SQL Server."
  community.general.mssql_script:
    login_user: "{{ mssql_2022_database_stig_db_user }}"
    login_password: "{{ mssql_2022_database_stig_db_password }}"
    login_host: "{{ mssql_2022_database_stig_db_host }}"
    script: |
      ALTER AUTHORIZATION ON SCHEMA::[{{ schema_name }}] TO [{{ principal_name }}]
  notify: Restart SQL Server service
  tags:
    - SQLD-22-001200
    - cat2
    - authorization

# -----------------------------------------
# SQLD-22-001400 - MEDIUM
# -----------------------------------------

- name: "SQLD-22-001400 | MANUAL CHECK - The role(s)/group(s) used to modify database structure (including but not limited to tables, indexes, storage, etc.) and logic modules (stored procedures, functions, triggers, links to software ext..."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Document and obtain approval for any nonadministrative users who require the ability to create, alter, or replace logic modules. Revoke the ALTER permission from unauthorized users and roles: REVOK..."
  tags:
    - SQLD-22-001400
    - cat2
    - authorization

