    login_password: "{{ mssql_2022_database_stig_db_password }}"
    login_host: "{{ mssql_2022_database_stig_db_host }}"
    script: |
      SELECT 1 -- TODO: Review STIG fixtext and implement appropriate SQL
  notify: Restart SQL Server service
  tags:
    - SQLD-22-002600
    - cat2
    - network_services

# -----------------------------------------
# SQLD-22-003100 - MEDIUM
# -----------------------------------------

- name: "SQLD-22-003100 | SQL Server must enforce access restrictions associated with changes to the configuration of the database(s)."
  community.general.mssql_script:
    login_user: "{{ mssql_2022_database_stig_db_user }}"
    login_password: "{{ mssql_2022_database_stig_db_password }}"
    login_host: "{{ mssql_2022_database_stig_db_host }}"
    script: |
      ALTER ROLE {{ mssql_2022_database_stig_role_name }} DROP MEMBER {{ mssql_2022_database_stig_member_name }};
  notify: Restart SQL Server service
  tags:
    - SQLD-22-003100
    - cat2
    - network_services

# -----------------------------------------
# SQLD-22-003300 - HIGH
# -----------------------------------------

- name: "SQLD-22-003300 | MANUAL CHECK - SQL Server must implement cryptographic mechanisms to prevent unauthorized modification or disclosure of organization-defined information at rest (to include, at a minimum, PII and classified infor..."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Where full-disk encryption is required, configure Windows and/or the storage system to provide this. Where TDE is required, create a master key, obtain a certificate protected by the master key, cr..."
  tags:
    - SQLD-22-003300
