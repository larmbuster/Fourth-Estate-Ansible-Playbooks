# -----------------------------------------
# O19C-00-009200 - MEDIUM
# -----------------------------------------

- name: "O19C-00-009200 | The Oracle REMOTE_OS_ROLES parameter must be set to FALSE."
  community.general.oracle_sql:
    username: "{{ oracle_19c_stig_db_user }}"
    password: "{{ oracle_19c_stig_db_password }}"
    service_name: "{{ oracle_19c_stig_db_service }}"
    sql: "ALTER SYSTEM SET remote_os_roles = FALSE scope=spfile;"
  notify: Restart Oracle listener
  tags:
    - O19C-00-009200
    - cat2
    - access_control

# -----------------------------------------
# O19C-00-009300 - MEDIUM
