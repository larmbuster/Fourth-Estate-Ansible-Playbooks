# -----------------------------------------
# O19C-00-009400 - MEDIUM
# -----------------------------------------

- name: "O19C-00-009400 | The Oracle password file ownership and permissions should be limited and the REMOTE_LOGIN_PASSWORDFILE parameter must be set to EXCLUSIVE or NONE."
  community.general.oracle_sql:
    username: "{{ oracle_19c_stig_db_user }}"
    password: "{{ oracle_19c_stig_db_password }}"
    service_name: "{{ oracle_19c_stig_db_service }}"
    sql: "alter system set REMOTE_LOGIN_PASSWORDFILE = 'EXCLUSIVE' scope = spfile;"
  notify: Restart Oracle listener
  tags:
    - O19C-00-009400
    - cat2
    - authentication

