# -----------------------------------------
# O19C-00-000800 - HIGH
# -----------------------------------------

- name: "O19C-00-000800 | MANUAL CHECK - Oracle Database must integrate with an organization-level authentication/access mechanism providing account management and automation for all users, groups, roles, and any other principals."
  ansible.builtin.debug:
    msg: "MANUAL CHECK: Integrate database management system (DBMS) security with an organization-level authentication/access mechanism providing account management for all users, groups, roles, and any other principals. ..."
  tags:
    - O19C-00-000800
    - cat1
    - authentication

